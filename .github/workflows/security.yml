name: Security (CVE detection)

# Triggered manually from release_all.sh (not on push/schedule).
on:
  workflow_dispatch:
    inputs:
      trigger_duration:
        description: "Seconds each attack trigger runs (default 300, matches agent_security canonical harness)"
        required: false
        default: "300"
      readiness_wait:
        description: "Seconds to wait for L7 attribution readiness before polling (default 120)"
        required: false
        default: "120"
      poll_attempts:
        description: "Number of detection verify attempts after readiness (default 6)"
        required: false
        default: "6"
      poll_interval:
        description: "Seconds between detection verify attempts (default 30)"
        required: false
        default: "30"
      scenarios:
        description: "Comma-separated CVE scenarios to run"
        required: false
        default: "blacklist_comm,cve_token_exfil,cve_sandbox_escape,memory_poisoning,credential_sprawl,supply_chain_exfil,npm_rat_beacon,file_events"

# Auto cancel previous runs if they were not completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Declare default permissions as read only.
permissions: read-all

env:
  # Defaults mirror the canonical agent_security E2E harness
  # (tests/e2e/run_e2e_harness.sh):
  #   SCENARIO_DURATION=150, l7_wait=120 for CVE scenarios,
  #   DETECTION_VERIFY_RETRIES=5, DETECTION_VERIFY_INTERVAL=30
  #   min_duration = l7_wait + (retries * interval) + 30 = 300s
  # Kept at 300s so the slower token-exfil triggers consistently clear
  # the anomalous-session + open-files L7 readiness threshold on all
  # three GitHub-hosted runners (Ubuntu, macOS, Windows).
  DEFAULT_TRIGGER_DURATION: "300"
  DEFAULT_READINESS_WAIT: "120"
  DEFAULT_POLL_ATTEMPTS: "6"
  DEFAULT_POLL_INTERVAL: "30"
  DEFAULT_SCENARIOS: "blacklist_comm,cve_token_exfil,cve_sandbox_escape,memory_poisoning,credential_sprawl,supply_chain_exfil,npm_rat_beacon,file_events"

jobs:
  detect:
    name: Detect (${{ matrix.label }})
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: ubuntu-24.04-x64
            arch: x86_64
          - os: macos-14
            label: macos-14-arm64
            arch: arm64
          - os: windows-2022
            label: windows-2022-x64
            arch: x86_64
    runs-on: ${{ matrix.os }}

    env:
      EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
      TRIGGER_DURATION: ${{ github.event.inputs.trigger_duration || '300' }}
      READINESS_WAIT: ${{ github.event.inputs.readiness_wait || '120' }}
      POLL_ATTEMPTS: ${{ github.event.inputs.poll_attempts || '6' }}
      POLL_INTERVAL: ${{ github.event.inputs.poll_interval || '30' }}
      SCENARIOS: ${{ github.event.inputs.scenarios || 'blacklist_comm,cve_token_exfil,cve_sandbox_escape,memory_poisoning,credential_sprawl,supply_chain_exfil,npm_rat_beacon,file_events' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup EDAMAME Posture (packet_capture=true, disconnected)
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          disconnected_mode: true
          packet_capture: true
          checkout: false
        env:
          EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}

      - name: Export EDAMAME_POSTURE env var
        shell: bash
        run: |
          echo "EDAMAME_POSTURE=$EDAMAME_BINARY_PATH" >> "$GITHUB_ENV"

      - name: Install edamame_cli
        id: install_cli
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          install_cli() {
            if [ "$RUNNER_OS" = "Windows" ]; then
              curl --proto '=https' --tlsv1.2 -sSf \
                https://raw.githubusercontent.com/edamametechnologies/edamame_cli/main/install.sh \
                | sh -s -- --force-binary
            else
              curl --proto '=https' --tlsv1.2 -sSf \
                https://raw.githubusercontent.com/edamametechnologies/edamame_cli/main/install.sh \
                | sudo -E sh -s --
            fi
          }
          for attempt in 1 2 3; do
            if install_cli; then
              echo "install attempt $attempt succeeded"
              break
            fi
            echo "install attempt $attempt failed, sleeping before retry"
            sleep $((attempt * 10))
          done
          if [ "$RUNNER_OS" = "Windows" ]; then
            EC=$(command -v edamame_cli.exe 2>/dev/null || command -v edamame_cli 2>/dev/null || echo "$HOME/edamame_cli.exe")
          else
            EC=$(command -v edamame_cli 2>/dev/null || echo /usr/local/bin/edamame_cli)
          fi
          echo "EDAMAME_CLI=$EC" >> "$GITHUB_ENV"
          "$EC" --version

      - name: Download CVE trigger scripts
        id: triggers
        shell: bash
        run: |
          TRIGGERS_DIR="${RUNNER_TEMP:-/tmp}/cve_triggers"
          mkdir -p "$TRIGGERS_DIR"
          BASE_URL="https://raw.githubusercontent.com/edamametechnologies/agent_security/main/tests/e2e/triggers"
          for f in _common.py _native_udp_probe.py _edamame_cli.py cleanup.py \
                   trigger_blacklist_comm.py trigger_cve_token_exfil.py trigger_cve_sandbox_escape.py \
                   trigger_memory_poisoning.py trigger_credential_sprawl.py \
                   trigger_supply_chain_exfil.py trigger_npm_rat_beacon.py trigger_file_events.py; do
            curl -sfL "$BASE_URL/$f" -o "$TRIGGERS_DIR/$f" || echo "WARN: failed to download $f"
          done
          echo "CVE_TRIGGERS_DIR=$TRIGGERS_DIR" >> "$GITHUB_ENV"
          ls -la "$TRIGGERS_DIR"

      - name: Install Python deps for triggers
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Verify daemon and capture readiness
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            "$EDAMAME_POSTURE" background-status || true
          else
            sudo -E "$EDAMAME_POSTURE" background-status || true
          fi
          "$EDAMAME_CLI" rpc get_core_version || true

      - name: Run CVE detection suite
        id: detection
        timeout-minutes: 60
        shell: bash
        env:
          EDAMAME_CLI: ${{ env.EDAMAME_CLI }}
        run: |
          mkdir -p "results/${{ matrix.label }}"
          # Timing parameters track the canonical agent_security harness
          # (tests/e2e/run_e2e_harness.sh) so behavior matches what plugin
          # E2E workflows already validate end-to-end.
          bash tests/security/run_cve_detection.sh \
            --triggers-dir "$CVE_TRIGGERS_DIR" \
            --output-dir "results/${{ matrix.label }}" \
            --trigger-duration "${TRIGGER_DURATION}" \
            --post-wait 5 \
            --poll-attempts "${POLL_ATTEMPTS}" \
            --poll-interval "${POLL_INTERVAL}" \
            --readiness-wait "${READINESS_WAIT}" \
            --agent-type "openclaw" \
            --scenarios "${SCENARIOS}"
          echo "--- results summary ---"
          cat "results/${{ matrix.label }}/results.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d['totals'], indent=2))"
        continue-on-error: true

      - name: Sanitize logs
        if: always()
        shell: bash
        run: |
          find "results/${{ matrix.label }}" -type f \( -name '*.log' -o -name '*.json' -o -name '*.ndjson' \) -print0 \
            | xargs -0 python3 tests/common/sanitize_logs.py || true

      - name: Upload platform results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-${{ matrix.label }}
          path: results/${{ matrix.label }}
          if-no-files-found: warn
          retention-days: 30

      - name: Slack alerts
        if: steps.install_cli.outcome == 'failure' || steps.triggers.outcome == 'failure' || steps.detection.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Security (CVE) Test Results for ${{ github.repository }} (${{ matrix.label }})*:
            - edamame_cli install: ${{ steps.install_cli.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Trigger fetch: ${{ steps.triggers.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - CVE Detection Suite: ${{ steps.detection.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Fail job if tests failed
        shell: bash
        if: steps.install_cli.outcome == 'failure' || steps.triggers.outcome == 'failure' || steps.detection.outcome == 'failure'
        run: |
          echo "## Security Results Summary (${{ matrix.label }})"
          echo "- edamame_cli install: ${{ steps.install_cli.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Trigger fetch: ${{ steps.triggers.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- CVE Detection Suite: ${{ steps.detection.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo ""
          echo "Forcing security job to fail because tests did not succeed."
          exit 1

  report:
    name: Consolidate report
    needs: detect
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all platform results
        uses: actions/download-artifact@v4
        with:
          pattern: security-*
          path: security_artifacts

      - name: Stage consolidated results
        shell: bash
        run: |
          mkdir -p results
          for d in security_artifacts/security-*; do
            [[ -d "$d" ]] || continue
            label=$(basename "$d" | sed 's/^security-//')
            cp -R "$d" "results/$label"
          done
          ls -la results

      - name: Generate VULNDETECTION.md
        id: report
        shell: bash
        run: |
          python3 tests/security/generate_report.py \
            --results-dir results \
            --output VULNDETECTION.md
          head -80 VULNDETECTION.md
        continue-on-error: true

      - name: Enforce security release gate
        id: gate
        if: always()
        shell: bash
        continue-on-error: true
        run: |
          set +e
          python3 tests/security/check_gate.py --results-dir results | tee gate-summary.md
          rc=${PIPESTATUS[0]}
          echo "Gate exit code: $rc"
          exit "$rc"

      - name: Append report to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Vulnerability Detection Report";
            echo;
            if [[ -f gate-summary.md ]]; then
              cat gate-summary.md;
              echo;
            fi
            if [[ -f VULNDETECTION.md ]]; then
              cat VULNDETECTION.md;
            else
              echo "_VULNDETECTION.md was not generated (report step failed)._";
            fi
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload consolidated artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            VULNDETECTION.md
            gate-summary.md
            results/
          if-no-files-found: warn
          retention-days: 90

      - name: Slack alerts
        if: steps.report.outcome == 'failure' || steps.gate.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Security Gate for ${{ github.repository }}*:
            - Report Generation: ${{ steps.report.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Release Gate (strict): ${{ steps.gate.outcome != 'failure' && '✅ Pass' || '❌ Regression (any CVE scenario failed on any platform)' }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Fail job if report or gate failed
        if: steps.report.outcome == 'failure' || steps.gate.outcome == 'failure'
        shell: bash
        run: |
          echo "## Security Gate Summary"
          echo "- Report Generation: ${{ steps.report.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Release Gate (strict): ${{ steps.gate.outcome != 'failure' && '✅ Pass' || '❌ Regression (any CVE scenario failed on any platform)' }}"
          echo ""
          echo "Forcing security job to fail: at least one CVE detection"
          echo "scenario reported status=fail on at least one platform."
          echo "The gate is strict (100% success required). Probabilistic"
          echo "iForest-dependent evasion scenarios are tracked under"
          echo "edamame_core/tests/evasion/ and do not gate releases here."
          echo "Block or roll back the release."
          exit 1
