name: Performance

# Triggered manually from release_all.sh (not on push/schedule).
on:
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Seconds per scenario (5 minutes by default)"
        required: false
        default: "300"
      scenarios:
        description: "Comma-separated scenarios to run (default: all six)"
        required: false
        default: "idle,hub_idle,capture,lanscan,llm,all"

# Auto cancel previous runs if they were not completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Declare default permissions as read only.
permissions: read-all

env:
  DEFAULT_DURATION: "300"
  DEFAULT_SCENARIOS: "idle,hub_idle,capture,lanscan,llm,all"

jobs:
  measure:
    name: Measure (${{ matrix.label }})
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: ubuntu-24.04-x64
            arch: x86_64
          - os: ubuntu-24.04-arm
            label: ubuntu-24.04-arm64
            arch: aarch64
          - os: macos-14
            label: macos-14-arm64
            arch: arm64
          - os: windows-2022
            label: windows-2022-x64
            arch: x86_64
    runs-on: ${{ matrix.os }}

    env:
      EDAMAME_POSTURE_USER: ${{ vars.EDAMAME_POSTURE_USER }}
      EDAMAME_POSTURE_DOMAIN: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
      EDAMAME_POSTURE_PIN: ${{ secrets.EDAMAME_POSTURE_PIN }}
      EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
      DURATION_SECONDS: ${{ github.event.inputs.duration_seconds || '300' }}
      SCENARIOS: ${{ github.event.inputs.scenarios || 'idle,hub_idle,capture,lanscan,llm,all' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install psutil==5.9.8 blake3==0.4.1

      - name: Install EDAMAME Posture
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-perf-${{ matrix.label }}
          disconnected_mode: ${{ (vars.EDAMAME_POSTURE_USER == '' || vars.EDAMAME_POSTURE_DOMAIN == '' || secrets.EDAMAME_POSTURE_PIN == '') && 'true' || 'false' }}
          checkout: false
        env:
          EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}

      - name: Export EDAMAME_POSTURE_BIN
        shell: bash
        run: |
          echo "EDAMAME_POSTURE_BIN=$EDAMAME_BINARY_PATH" >> "$GITHUB_ENV"
          echo "binary path: $EDAMAME_BINARY_PATH"
          "$EDAMAME_BINARY_PATH" get-core-version

      - name: Stop auto-started daemon
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            "$EDAMAME_POSTURE_BIN" background-stop || true
          else
            sudo -E "$EDAMAME_POSTURE_BIN" background-stop || true
          fi
          sleep 5

      - name: Calibrate CPU
        id: calibrate
        shell: bash
        run: |
          mkdir -p "results/${{ matrix.label }}"
          python3 tests/perf/calibrate.py \
            --budget 3.0 \
            --output "results/${{ matrix.label }}/calibration.json"
          cat "results/${{ matrix.label }}/calibration.json"
        continue-on-error: true

      - name: Run performance scenarios
        id: scenarios
        shell: bash
        env:
          PYTHON: python3
        run: |
          set -u
          any_fail=0
          IFS=',' read -r -a scen_list <<<"${SCENARIOS}"
          for scen in "${scen_list[@]}"; do
            scen="${scen// /}"
            [[ -z "$scen" ]] && continue
            echo "::group::scenario=$scen duration=${DURATION_SECONDS}s"
            if bash tests/perf/run_scenario.sh \
                --scenario "$scen" \
                --duration "${DURATION_SECONDS}" \
                --output-dir "results/${{ matrix.label }}/$scen"; then
              echo "::endgroup::"
            else
              echo "scenario $scen FAILED on ${{ matrix.label }}"
              echo "::endgroup::"
              any_fail=1
            fi
          done
          exit "$any_fail"
        continue-on-error: true

      - name: Sanitize logs
        if: always()
        shell: bash
        run: |
          find "results/${{ matrix.label }}" -type f \( -name '*.log' -o -name '*.txt' \) -print0 \
            | xargs -0 python3 tests/common/sanitize_logs.py || true

      - name: Upload platform results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ matrix.label }}
          path: results/${{ matrix.label }}
          if-no-files-found: warn
          retention-days: 30

      - name: Slack alerts
        if: steps.calibrate.outcome == 'failure' || steps.scenarios.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Performance Test Results for ${{ github.repository }} (${{ matrix.label }})*:
            - CPU Calibration: ${{ steps.calibrate.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Performance Scenarios: ${{ steps.scenarios.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Fail job if tests failed
        shell: bash
        if: steps.calibrate.outcome == 'failure' || steps.scenarios.outcome == 'failure'
        run: |
          echo "## Performance Results Summary (${{ matrix.label }})"
          echo "- CPU Calibration: ${{ steps.calibrate.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Performance Scenarios: ${{ steps.scenarios.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo ""
          echo "Forcing performance job to fail because tests did not succeed."
          exit 1

  report:
    name: Consolidate report
    needs: measure
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      EDAMAME_POSTURE_USER: ${{ vars.EDAMAME_POSTURE_USER }}
      EDAMAME_POSTURE_DOMAIN: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
      EDAMAME_POSTURE_PIN: ${{ secrets.EDAMAME_POSTURE_PIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The org-level IP allow list blocks gh api / gh run download from
      # stock GitHub-hosted runners. Starting EDAMAME Posture in connected
      # mode lets the daemon register this runner with the hub and get its
      # egress IP whitelisted, which is the same pattern tests.yml uses.
      - name: Setup EDAMAME Posture (whitelist runner IP)
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-perf-report
          checkout: false
          token: ${{ secrets.DEV_GITHUB_TOKEN }}
          wait_for_api: true
          wait_for_https: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all platform results
        uses: actions/download-artifact@v4
        with:
          pattern: perf-*
          path: perf_artifacts

      - name: Stage consolidated results
        shell: bash
        run: |
          mkdir -p results
          for d in perf_artifacts/perf-*; do
            [[ -d "$d" ]] || continue
            label=$(basename "$d" | sed 's/^perf-//')
            cp -R "$d" "results/$label"
          done
          ls -la results

      - name: Download baseline from last successful perf run
        id: baseline
        shell: bash
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.DEV_GITHUB_TOKEN }}
        run: |
          mkdir -p baseline
          # Find the most recent successful perf.yml run (other than this one).
          # Only runs that explicitly uploaded performance-baseline count, so
          # partial smoke-test runs that only upload performance-report are
          # skipped.
          echo "Looking for the most recent successful perf run with a performance-baseline artifact..."
          PREV_RUN=""
          RUNS=$(gh run list \
            --workflow perf.yml \
            --repo "${{ github.repository }}" \
            --branch main \
            --status success \
            --limit 30 \
            --json databaseId \
            --jq '.[].databaseId' 2>/dev/null || true)
          for rid in $RUNS; do
            if [[ "$rid" == "${{ github.run_id }}" ]]; then
              continue
            fi
            # Confirm the run has the baseline artifact (i.e. was a full run)
            if gh api "repos/${{ github.repository }}/actions/runs/$rid/artifacts" \
                --jq '.artifacts[].name' 2>/dev/null | grep -q '^performance-baseline$'; then
              PREV_RUN="$rid"
              break
            fi
          done

          if [[ -z "$PREV_RUN" ]]; then
            echo "No previous successful perf run with performance-baseline found."
            echo "Gate will run in soft no-op mode."
            exit 0
          fi

          echo "Downloading performance-baseline from run $PREV_RUN..."
          gh run download "$PREV_RUN" \
            --repo "${{ github.repository }}" \
            --name performance-baseline \
            --dir baseline
          echo "baseline_run=$PREV_RUN" >> "$GITHUB_OUTPUT"

      - name: Inspect baseline
        if: always()
        shell: bash
        run: |
          if [ -d baseline/results ]; then
            echo "Baseline present (from run ${{ steps.baseline.outputs.baseline_run }}):"
            ls -la baseline/results
          else
            echo "No baseline available - gate will run in soft no-op mode."
          fi

      - name: Generate PERFORMANCE.md
        id: report
        shell: bash
        run: |
          python3 tests/perf/generate_report.py \
            --results-dir results \
            --output PERFORMANCE.md
          head -80 PERFORMANCE.md
        continue-on-error: true

      - name: Enforce performance release gate
        id: gate
        if: always()
        shell: bash
        continue-on-error: true
        env:
          REGRESSION_THRESHOLD: "0.50"
        run: |
          set +e
          python3 tests/perf/check_regression.py \
            --current results \
            --baseline baseline/results \
            --threshold "$REGRESSION_THRESHOLD" \
            | tee gate-summary.md
          rc=${PIPESTATUS[0]}
          echo "Gate exit code: $rc"
          exit "$rc"

      - name: Append report to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Performance Report";
            echo;
            if [[ -f gate-summary.md ]]; then
              cat gate-summary.md;
              echo;
            fi
            if [[ -f PERFORMANCE.md ]]; then
              cat PERFORMANCE.md;
            else
              echo "_PERFORMANCE.md was not generated (report step failed)._";
            fi
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload consolidated artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            PERFORMANCE.md
            gate-summary.md
            results/
          if-no-files-found: warn
          retention-days: 90

      - name: Stage baseline artifact for future runs
        # Only publish a new baseline when:
        # - Report and gate both succeeded (no silent regression -> baseline)
        # - The run covered the full default scenario set AND full duration
        #   (partial / smoke-test runs must not overwrite a real baseline)
        id: promote
        if: |
          steps.report.outcome == 'success' && steps.gate.outcome == 'success' &&
          (github.event.inputs.scenarios == '' || github.event.inputs.scenarios == 'idle,hub_idle,capture,lanscan,llm,all') &&
          (github.event.inputs.duration_seconds == '' || fromJSON(github.event.inputs.duration_seconds) >= 300)
        shell: bash
        run: |
          rm -rf baseline_next
          mkdir -p baseline_next
          cp -R results baseline_next/results
          cp PERFORMANCE.md baseline_next/ 2>/dev/null || true
          echo "Staged new baseline for future runs (run_id=${{ github.run_id }})"
          echo "promoted=true" >> "$GITHUB_OUTPUT"

      - name: Upload performance-baseline artifact
        if: steps.promote.outputs.promoted == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: baseline_next/
          if-no-files-found: warn
          retention-days: 365

      - name: Slack alerts
        if: steps.report.outcome == 'failure' || steps.gate.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Performance Gate for ${{ github.repository }}*:
            - Report Generation: ${{ steps.report.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Release Gate (+50% regression): ${{ steps.gate.outcome != 'failure' && '✅ Pass' || '❌ Regression' }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Fail job if report or gate failed
        if: steps.report.outcome == 'failure' || steps.gate.outcome == 'failure'
        shell: bash
        run: |
          echo "## Performance Gate Summary"
          echo "- Report Generation: ${{ steps.report.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Release Gate: ${{ steps.gate.outcome != 'failure' && '✅ Pass' || '❌ Regression' }}"
          echo ""
          echo "Forcing performance job to fail because the release gate is not satisfied."
          echo "A +50% regression on any tracked metric justifies blocking or rolling back the release."
          exit 1
