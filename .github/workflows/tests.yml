name: Cross-platform tests

# Single workflow that builds edamame_posture once per native platform and
# fans the produced binary out to:
#   * native general tests   (cargo unit, eBPF diag, standalone, integration, LLM)
#   * container general tests (build inside the container, run general tests)
#   * performance benchmarks  (perf scenarios + regression gate)
#   * security CVE detection  (false-positive baseline + CVE suite + strict gate)
#
# Triggers:
#   - push to dev/main on src/ Cargo.toml/Cargo.lock: full default run
#     (all tests, all platforms, build from source).
#   - workflow_dispatch: same defaults, plus per-suite/per-platform overrides
#     and an option to validate the latest released binary instead of the
#     source build.
#
# Phase 0 release gates are evaluated on the success of THIS workflow:
#   - tests       : test-native + test-container must succeed
#   - perf        : perf-report enforces the +100% regression gate (with
#                   per-scenario multipliers, e.g. x2 for `lanscan` to
#                   absorb Windows Defender / DNS / mDNS variance on
#                   GitHub-hosted runners; see gate-summary.md table)
#   - security    : security-report enforces zero CVE failures (strict)
# Push-gated (paths filter): workflow_dispatch alone cannot satisfy Phase 0. Phase 0 retry 3.

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run general tests (cargo unit, eBPF diag, standalone, integration, LLM)."
        type: boolean
        default: true
      run_perf:
        description: "Run performance benchmarks (per-scenario CPU/RAM measurements + regression gate)."
        type: boolean
        default: true
      run_security:
        description: "Run CVE detection suite (false-positive baseline + CVE scenarios + strict gate)."
        type: boolean
        default: true
      platforms:
        description: "Comma-separated platform labels (default: all). Native: ubuntu-x64, ubuntu-arm64, macos-arm64, windows-x64. Containers (general tests only): ubuntu-20.04, ubuntu-18.04, alpine-x64, alpine-arm64."
        required: false
        default: "ubuntu-x64,ubuntu-arm64,macos-arm64,windows-x64,ubuntu-20.04,ubuntu-18.04,alpine-x64,alpine-arm64"
      build_from_source:
        description: "Build edamame_posture from this checkout. If false, perf/security run against the latest released binary installed by edamame_posture_action; general tests are skipped (they require source)."
        type: boolean
        default: true
      reuse_build_run_id:
        description: "Existing workflow run ID to download posture-binary-* artifacts from. Empty = build in this run."
        required: false
        default: ""
      perf_duration_seconds:
        description: "Seconds per perf scenario (default 300)."
        required: false
        default: "300"
      perf_scenarios:
        description: "Comma-separated perf scenarios to run."
        required: false
        default: "idle,hub_idle,capture,lanscan,llm,all"
      security_trigger_duration:
        description: "Seconds each CVE attack trigger runs (default 300, matches agent_security harness)."
        required: false
        default: "300"
      security_readiness_wait:
        description: "Seconds to wait for L7 attribution readiness before polling (default 120)."
        required: false
        default: "120"
      security_poll_attempts:
        description: "Number of detection verify poll attempts after readiness (default 6)."
        required: false
        default: "6"
      security_poll_interval:
        description: "Seconds between detection verify poll attempts (default 30)."
        required: false
        default: "30"
      security_scenarios:
        description: "Comma-separated CVE scenarios to run."
        required: false
        default: "blacklist_comm,cve_token_exfil,cve_sandbox_escape,memory_poisoning,credential_sprawl,supply_chain_exfil,npm_rat_beacon,file_events"
  push:
    branches:
      - 'dev'
      - 'main'
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      # Also re-run when the workflow itself or any test/perf/security
      # harness changes, so iterating on the gate stays push-triggered.
      - '.github/workflows/tests.yml'
      - 'tests/**'

# Auto cancel previous runs if they were not completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Declare default permissions as read only.
permissions: read-all

jobs:

  # =========================================================================
  # setup: parse dispatch inputs, emit effective flags, build dynamic matrices
  # =========================================================================
  setup:
    name: Setup (parse inputs, build matrices)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_tests: ${{ steps.flags.outputs.run_tests }}
      run_perf: ${{ steps.flags.outputs.run_perf }}
      run_security: ${{ steps.flags.outputs.run_security }}
      build_from_source: ${{ steps.flags.outputs.build_from_source }}
      reuse_build_run_id: ${{ steps.flags.outputs.reuse_build_run_id }}
      full_default_run: ${{ steps.flags.outputs.full_default_run }}
      perf_duration_seconds: ${{ steps.flags.outputs.perf_duration_seconds }}
      perf_scenarios: ${{ steps.flags.outputs.perf_scenarios }}
      perf_full_default: ${{ steps.flags.outputs.perf_full_default }}
      security_trigger_duration: ${{ steps.flags.outputs.security_trigger_duration }}
      security_readiness_wait: ${{ steps.flags.outputs.security_readiness_wait }}
      security_poll_attempts: ${{ steps.flags.outputs.security_poll_attempts }}
      security_poll_interval: ${{ steps.flags.outputs.security_poll_interval }}
      security_scenarios: ${{ steps.flags.outputs.security_scenarios }}
      native_matrix: ${{ steps.matrix.outputs.native }}
      container_matrix: ${{ steps.matrix.outputs.container }}
      have_native: ${{ steps.matrix.outputs.have_native }}
      have_container: ${{ steps.matrix.outputs.have_container }}
    steps:
      - name: Resolve flags and per-suite parameters
        id: flags
        shell: bash
        env:
          IN_RUN_TESTS: ${{ github.event.inputs.run_tests }}
          IN_RUN_PERF: ${{ github.event.inputs.run_perf }}
          IN_RUN_SECURITY: ${{ github.event.inputs.run_security }}
          IN_BUILD_FROM_SOURCE: ${{ github.event.inputs.build_from_source }}
          IN_REUSE_BUILD_RUN_ID: ${{ github.event.inputs.reuse_build_run_id }}
          IN_PLATFORMS: ${{ github.event.inputs.platforms }}
          IN_PERF_DURATION: ${{ github.event.inputs.perf_duration_seconds }}
          IN_PERF_SCENARIOS: ${{ github.event.inputs.perf_scenarios }}
          IN_SEC_TRIGGER: ${{ github.event.inputs.security_trigger_duration }}
          IN_SEC_READINESS: ${{ github.event.inputs.security_readiness_wait }}
          IN_SEC_POLL_A: ${{ github.event.inputs.security_poll_attempts }}
          IN_SEC_POLL_I: ${{ github.event.inputs.security_poll_interval }}
          IN_SEC_SCEN: ${{ github.event.inputs.security_scenarios }}
        run: |
          set -euo pipefail
          # Defaults match the workflow_dispatch defaults so push events
          # behave identically to an "all defaults" manual run.
          DEFAULT_PERF_SCEN="idle,hub_idle,capture,lanscan,llm,all"
          DEFAULT_SEC_SCEN="blacklist_comm,cve_token_exfil,cve_sandbox_escape,memory_poisoning,credential_sprawl,supply_chain_exfil,npm_rat_beacon,file_events"
          DEFAULT_PLATFORMS="ubuntu-x64,ubuntu-arm64,macos-arm64,windows-x64,ubuntu-20.04,ubuntu-18.04,alpine-x64,alpine-arm64"

          RT="${IN_RUN_TESTS:-true}"
          RP="${IN_RUN_PERF:-true}"
          RS="${IN_RUN_SECURITY:-true}"
          BF="${IN_BUILD_FROM_SOURCE:-true}"
          RBR="${IN_REUSE_BUILD_RUN_ID:-}"
          PD="${IN_PERF_DURATION:-300}"
          PS="${IN_PERF_SCENARIOS:-$DEFAULT_PERF_SCEN}"
          ST="${IN_SEC_TRIGGER:-300}"
          SR="${IN_SEC_READINESS:-120}"
          SPA="${IN_SEC_POLL_A:-6}"
          SPI="${IN_SEC_POLL_I:-30}"
          SS="${IN_SEC_SCEN:-$DEFAULT_SEC_SCEN}"
          PLATS="${IN_PLATFORMS:-$DEFAULT_PLATFORMS}"

          # full_default_run: true when this run covers the full default
          # platform set (used to gate baseline promotion and other "this
          # is the canonical run" checks).
          if [[ "$PLATS" == "$DEFAULT_PLATFORMS" ]] && [[ "$BF" == "true" ]]; then
            FULL_DEFAULT=true
          else
            FULL_DEFAULT=false
          fi
          if [[ -n "$RBR" && "$BF" != "true" ]]; then
            echo "::error::reuse_build_run_id requires build_from_source=true"
            exit 1
          fi

          # perf_full_default: true when perf would, additionally, cover
          # the full default scenario set at the canonical 300s duration.
          if [[ "$FULL_DEFAULT" == "true" ]] \
             && [[ "$PS" == "$DEFAULT_PERF_SCEN" ]] \
             && [[ "$PD" -ge 300 ]]; then
            PERF_FULL_DEFAULT=true
          else
            PERF_FULL_DEFAULT=false
          fi

          {
            echo "run_tests=$RT"
            echo "run_perf=$RP"
            echo "run_security=$RS"
            echo "build_from_source=$BF"
            echo "reuse_build_run_id=$RBR"
            echo "full_default_run=$FULL_DEFAULT"
            echo "perf_duration_seconds=$PD"
            echo "perf_scenarios=$PS"
            echo "perf_full_default=$PERF_FULL_DEFAULT"
            echo "security_trigger_duration=$ST"
            echo "security_readiness_wait=$SR"
            echo "security_poll_attempts=$SPA"
            echo "security_poll_interval=$SPI"
            echo "security_scenarios=$SS"
          } >> "$GITHUB_OUTPUT"

          echo "Effective flags:"
          echo "  run_tests=$RT  run_perf=$RP  run_security=$RS  build_from_source=$BF  reuse_build_run_id=${RBR:-<current run>}"
          echo "  full_default_run=$FULL_DEFAULT  perf_full_default=$PERF_FULL_DEFAULT"

      - name: Build native + container matrices
        id: matrix
        shell: bash
        env:
          PLATFORMS_INPUT: ${{ github.event.inputs.platforms }}
        run: |
          set -euo pipefail
          DEFAULT_PLATFORMS="ubuntu-x64,ubuntu-arm64,macos-arm64,windows-x64,ubuntu-20.04,ubuntu-18.04,alpine-x64,alpine-arm64"
          PLATFORMS="${PLATFORMS_INPUT:-$DEFAULT_PLATFORMS}"
          echo "Selected platforms: $PLATFORMS"

          declare -A NATIVE
          NATIVE[ubuntu-x64]='{"label":"ubuntu-x64","os":"ubuntu","runs_on":"ubuntu-24.04","arch":"x86_64","target":"x86_64-unknown-linux-gnu"}'
          NATIVE[ubuntu-arm64]='{"label":"ubuntu-arm64","os":"ubuntu","runs_on":"ubuntu-24.04-arm","arch":"aarch64","target":"aarch64-unknown-linux-gnu"}'
          NATIVE[macos-arm64]='{"label":"macos-arm64","os":"macos","runs_on":"macos-14","arch":"arm64","target":"aarch64-apple-darwin"}'
          NATIVE[windows-x64]='{"label":"windows-x64","os":"windows","runs_on":"windows-2022","arch":"x86_64","target":"x86_64-pc-windows-msvc"}'

          declare -A CONTAINERS
          CONTAINERS[ubuntu-20.04]='{"label":"ubuntu-20.04","runs_on":"ubuntu-latest","arch":"x86_64","container_image":"ubuntu:20.04","container_name":"ubuntu-20.04"}'
          CONTAINERS[ubuntu-18.04]='{"label":"ubuntu-18.04","runs_on":"ubuntu-latest","arch":"x86_64","container_image":"ubuntu:18.04","container_name":"ubuntu-18.04"}'
          CONTAINERS[alpine-x64]='{"label":"alpine-x64","runs_on":"ubuntu-latest","arch":"x86_64","container_image":"alpine:3.20","container_name":"alpine-3.20-x86_64-musl"}'
          CONTAINERS[alpine-arm64]='{"label":"alpine-arm64","runs_on":"ubuntu-24.04-arm","arch":"aarch64","container_image":"alpine:3.20","container_name":"alpine-3.20-aarch64-musl"}'

          IFS=',' read -ra REQ <<< "$PLATFORMS"
          NATIVE_OUT=()
          CONT_OUT=()
          for raw in "${REQ[@]}"; do
            p="${raw// /}"
            [[ -z "$p" ]] && continue
            if [[ -n "${NATIVE[$p]:-}" ]]; then
              NATIVE_OUT+=("${NATIVE[$p]}")
            elif [[ -n "${CONTAINERS[$p]:-}" ]]; then
              CONT_OUT+=("${CONTAINERS[$p]}")
            else
              echo "::warning::Unknown platform label '$p' (ignored)"
            fi
          done

          if (( ${#NATIVE_OUT[@]} == 0 )); then
            NATIVE_JSON='{"include":[]}'
            HAVE_NATIVE=false
          else
            NATIVE_JSON="{\"include\":[$(IFS=,; echo "${NATIVE_OUT[*]}")]}"
            HAVE_NATIVE=true
          fi

          if (( ${#CONT_OUT[@]} == 0 )); then
            CONT_JSON='{"include":[]}'
            HAVE_CONT=false
          else
            CONT_JSON="{\"include\":[$(IFS=,; echo "${CONT_OUT[*]}")]}"
            HAVE_CONT=true
          fi

          {
            echo "native=$NATIVE_JSON"
            echo "container=$CONT_JSON"
            echo "have_native=$HAVE_NATIVE"
            echo "have_container=$HAVE_CONT"
          } >> "$GITHUB_OUTPUT"

          echo "Native matrix: $NATIVE_JSON"
          echo "Container matrix: $CONT_JSON"

  # =========================================================================
  # build: cargo build --release + sign + upload artifact (per native platform)
  # =========================================================================
  build:
    name: Build (${{ matrix.label }})
    needs: setup
    if: needs.setup.outputs.build_from_source == 'true' && needs.setup.outputs.reuse_build_run_id == '' && needs.setup.outputs.have_native == 'true'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.native_matrix) }}
    runs-on: ${{ matrix.runs_on }}

    env:
      EDAMAME_APP_SENTRY: ${{ secrets.EDAMAME_APP_SENTRY }}
      PWNED_API_KEY: ${{ secrets.PWNED_API_KEY }}
      EDAMAME_TARGET: ${{ secrets.EDAMAME_TARGET }}
      EDAMAME_CORE_TARGET: ${{ secrets.EDAMAME_CORE_TARGET }}
      EDAMAME_CORE_SERVER: ${{ secrets.EDAMAME_CORE_SERVER }}
      EDAMAME_CA_PEM: ${{ secrets.EDAMAME_CA_PEM }}
      EDAMAME_CLIENT_PEM: ${{ secrets.EDAMAME_CLIENT_PEM }}
      EDAMAME_CLIENT_KEY: ${{ secrets.EDAMAME_CLIENT_KEY }}
      EDAMAME_SERVER_PEM: ${{ secrets.EDAMAME_SERVER_PEM }}
      EDAMAME_SERVER_KEY: ${{ secrets.EDAMAME_SERVER_KEY }}
      EDAMAME_CLIENT_CA_PEM: ${{ secrets.EDAMAME_CLIENT_CA_PEM }}
      LAMBDA_SIGNATURE: ${{ secrets.LAMBDA_SIGNATURE }}
      MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}

    steps:

      - name: Setup EDAMAME Posture (whitelist runner IP, checkout source)
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-build-${{ matrix.label }}
          checkout: true
          token: ${{ secrets.DEV_GITHUB_TOKEN }}
          wait_for_api: true
          wait_for_https: true

      - name: Configure Git Authentication to import private crates
        run: |
          git config --global user.email "dev@edamame.tech"
          git config --global user.name "EDAMAME Dev"
          git config --global url."https://edamamedev:${{ secrets.DEV_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install build dependencies (apt) for Linux
        if: matrix.os == 'ubuntu'
        shell: bash
        run: |
          wait_for_apt_locks() {
            echo "Checking for apt/dpkg locks..."
            local TIMEOUT=300
            local TIME_PASSED=0
            local LOCK_FILES=(
              "/var/lib/apt/lists/lock"
              "/var/lib/dpkg/lock-frontend"
              "/var/lib/dpkg/lock"
              "/var/cache/apt/archives/lock"
            )
            while [ $TIME_PASSED -lt $TIMEOUT ]; do
              local LOCKED=false
              local HAS_LOCK_CHECKER=false
              if command -v fuser >/dev/null 2>&1; then
                HAS_LOCK_CHECKER=true
                for lock_file in "${LOCK_FILES[@]}"; do
                  if [ -f "$lock_file" ] && sudo fuser "$lock_file" >/dev/null 2>&1; then
                    LOCKED=true
                    echo "  Lock held: $lock_file (by process $(sudo fuser "$lock_file" 2>/dev/null))"
                    break
                  fi
                done
              fi
              if [ "$LOCKED" = "false" ] && command -v lsof >/dev/null 2>&1; then
                HAS_LOCK_CHECKER=true
                for lock_file in "${LOCK_FILES[@]}"; do
                  if [ -f "$lock_file" ] && sudo lsof "$lock_file" >/dev/null 2>&1; then
                    LOCKED=true
                    echo "  Lock held (lsof): $lock_file"
                    break
                  fi
                done
              fi
              if [ "$HAS_LOCK_CHECKER" = "false" ]; then
                echo "No lock checker (fuser/lsof) available, proceeding..."
                return 0
              fi
              if [ "$LOCKED" = "false" ]; then
                echo "No apt/dpkg locks held, proceeding..."
                return 0
              fi
              echo "Waiting for apt/dpkg locks to be released... ($TIME_PASSED/${TIMEOUT}s)"
              sleep 5
              TIME_PASSED=$((TIME_PASSED + 5))
            done
            echo "Timed out waiting for apt/dpkg locks after $TIMEOUT seconds."
            return 1
          }

          run_apt() {
            local MAX_ATTEMPTS=10
            local ATTEMPTS=0
            if command -v sudo >/dev/null 2>&1; then PREFIX="sudo -E "; else PREFIX=""; fi
            while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              ATTEMPTS=$((ATTEMPTS + 1))
              echo "apt-get $* (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
              if ! wait_for_apt_locks; then
                echo "Failed to acquire locks, retrying..."
                sleep 5
                continue
              fi
              if $PREFIX apt-get "$@"; then
                return 0
              fi
              RC=$?
              echo "apt-get $* failed (rc=$RC)"
              if [ $RC -eq 100 ]; then
                echo "Attempting dpkg --configure -a to fix interrupted state..."
                sudo dpkg --configure -a || true
              fi
              echo "Waiting 5s before retry..."
              sleep 5
            done
            echo "apt-get $* failed after $MAX_ATTEMPTS attempts"
            return 1
          }

          export DEBIAN_FRONTEND=noninteractive
          echo "Waiting for any background apt processes to complete..."
          wait_for_apt_locks
          run_apt update -y
          run_apt install -y protobuf-compiler libpcap-dev pkg-config libgtk-3-dev
          run_apt install -y clang llvm libbpf-dev
          run_apt install -y "linux-headers-$(uname -r)"
          if [[ "${{ matrix.arch }}" == "aarch64" ]]; then
            run_apt install -y binutils-aarch64-linux-gnu
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies (Homebrew) for macOS
        if: matrix.os == 'macos'
        run: |
          brew install protobuf
          brew install wget

      - name: Setup .NET 8.0 for Windows
        if: matrix.os == 'windows'
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Install build dependencies (Chocolatey) for Windows
        if: matrix.os == 'windows'
        run: |
          choco install protoc wget
          if (-not (dotnet tool list --global | Select-String -Pattern "AzureSignTool")) {
            dotnet tool install --global AzureSignTool
          }

      - name: Configure Windows clang-cl toolchain
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $clang = 'C:\Program Files\LLVM\bin\clang-cl.exe'
          $llvmLib = 'C:\Program Files\LLVM\bin\llvm-lib.exe'
          if (!(Test-Path $clang) -or !(Test-Path $llvmLib)) {
            choco install llvm -y
          }
          if (!(Test-Path $clang) -or !(Test-Path $llvmLib)) {
            throw "LLVM Windows toolchain not found"
          }
          "CC_x86_64_pc_windows_msvc=$clang" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=$clang" >> $env:GITHUB_ENV
          "AR_x86_64_pc_windows_msvc=$llvmLib" >> $env:GITHUB_ENV

      - name: Set environment variables
        shell: bash
        run: |
          echo "BINARY_PATH=./target/release/edamame_posture${{ matrix.os == 'windows' && '.exe' || '' }}" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=/tmp/app-signing.keychain-db" >> "$GITHUB_ENV"

      - name: Build application
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu" ]; then
            echo "=== eBPF Build Environment ==="
            echo "clang: $(which clang 2>/dev/null || echo 'NOT FOUND')"
            clang --version 2>/dev/null | head -1 || echo "clang not available"
            echo "libbpf headers: $(ls /usr/include/bpf/bpf_helpers.h 2>/dev/null || echo 'NOT FOUND')"
          fi
          cargo build --release 2>&1 | tee /tmp/build.log
          if [ "${{ matrix.os }}" = "ubuntu" ]; then
            echo "=== eBPF Build Messages ==="
            grep -iE "eBPF|l7_ebpf" /tmp/build.log | head -30 || echo "(no eBPF messages)"
          fi

      - name: Decode ES provisioning profile for macOS
        if: matrix.os == 'macos'
        shell: bash
        run: |
          echo "${{ secrets.APPLE_ES_POSTURE_PROVISIONING_PROFILE }}" | base64 --decode > /tmp/EDAMAME_Posture.provisionprofile

      - name: Setup signing for macOS
        if: matrix.os == 'macos'
        shell: bash
        run: |
          echo ${{ secrets.APPLE_DEVELOPMENT_CER }} | base64 --decode > certificate_dev.cer
          echo ${{ secrets.APPLE_DEVELOPMENT_KEY }} | base64 --decode > certificate_dev.key
          echo ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CER }} | base64 --decode > certificate_installer.cer
          echo ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_KEY }} | base64 --decode > certificate_installer.key
          echo ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CER }} | base64 --decode > certificate_application.cer
          echo ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_KEY }} | base64 --decode > certificate_application.key

          openssl pkcs12 -export -name zup -in certificate_dev.cer -inkey certificate_dev.key -passin pass:${{ secrets.APPLE_P12_PASSWORD }} -out certificate_dev.p12 -passout pass:${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          openssl pkcs12 -export -name zup -in certificate_installer.cer -inkey certificate_installer.key -passin pass:${{ secrets.APPLE_P12_PASSWORD }} -out certificate_installer.p12 -passout pass:${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          openssl pkcs12 -export -name zup -in certificate_application.cer -inkey certificate_application.key -passin pass:${{ secrets.APPLE_P12_PASSWORD }} -out certificate_application.p12 -passout pass:${{ secrets.MACOS_KEYCHAIN_PASSWORD }}

          security create-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH

          security import certificate_dev.p12 -P "${{ secrets.APPLE_P12_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import certificate_installer.p12 -P "${{ secrets.APPLE_P12_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import certificate_application.p12 -P "${{ secrets.APPLE_P12_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH

          echo ${{ secrets.APPLE_APPSTORE_CONNECT_API_KEY }} | base64 --decode > appstore_connect_api_key.p8
          xcrun notarytool store-credentials -k appstore_connect_api_key.p8 -d ${{ secrets.APPLE_APPSTORE_CONNECT_API_KEY_ID }} -i ${{ secrets.APPLE_APPSTORE_CONNECT_API_ISSUER_ID }} Edamame

      - name: Package, sign, notarize macOS binary
        if: matrix.os == 'macos'
        shell: bash
        run: |
          ./macos/make-pkg.sh --provisioning-profile /tmp/EDAMAME_Posture.provisionprofile
          ./macos/notarization.sh ./target/pkg/edamame-posture.pkg
          # Verify the pkg before uploading: install locally, check the
          # bundle is properly signed/notarized, then leave the install
          # in place so any inline diagnostics still work.
          sudo installer -verboseR -pkg ./target/pkg/edamame-posture.pkg -target /
          BUNDLE_PATH="/Library/Application Support/EDAMAME/EDAMAME-Posture/edamame_posture.app"
          test -d "$BUNDLE_PATH/Contents/MacOS"
          test -f "$BUNDLE_PATH/Contents/embedded.provisionprofile"
          test -L /usr/local/bin/edamame_posture
          codesign --verify --deep --strict --verbose=2 "$BUNDLE_PATH"

      - name: Sign Windows binary
        if: matrix.os == 'windows'
        run: AzureSignTool sign -kvt ${{ secrets.AZURE_SIGN_TENANT_ID }} -kvu ${{ secrets.AZURE_SIGN_KEY_VAULT_URI }} -kvi ${{ secrets.AZURE_SIGN_CLIENT_ID }} -kvs ${{ secrets.AZURE_SIGN_CLIENT_SECRET }} -kvc ${{ secrets.AZURE_SIGN_CERT_NAME }} -tr http://timestamp.digicert.com -v ./target/release/edamame_posture.exe

      - name: Upload binary artifact (Linux)
        if: matrix.os == 'ubuntu'
        uses: actions/upload-artifact@v4
        with:
          name: posture-binary-${{ matrix.label }}
          path: target/release/edamame_posture
          if-no-files-found: error
          retention-days: 7

      - name: Upload binary artifact (macOS, signed pkg)
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: posture-binary-${{ matrix.label }}
          path: target/pkg/edamame-posture.pkg
          if-no-files-found: error
          retention-days: 7

      - name: Upload binary artifact (Windows, signed exe)
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: posture-binary-${{ matrix.label }}
          path: target/release/edamame_posture.exe
          if-no-files-found: error
          retention-days: 7

  # =========================================================================
  # test-native: download artifact, run general tests on native platforms
  # =========================================================================
  test-native:
    name: Native tests (${{ matrix.label }})
    needs: [setup, build]
    if: |
      always() && needs.setup.result == 'success' &&
      needs.setup.outputs.run_tests == 'true' &&
      needs.setup.outputs.build_from_source == 'true' &&
      needs.setup.outputs.have_native == 'true' &&
      needs.build.result == 'success'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.native_matrix) }}
    runs-on: ${{ matrix.runs_on }}

    env:
      EDAMAME_APP_SENTRY: ${{ secrets.EDAMAME_APP_SENTRY }}
      PWNED_API_KEY: ${{ secrets.PWNED_API_KEY }}
      EDAMAME_TARGET: ${{ secrets.EDAMAME_TARGET }}
      EDAMAME_CORE_TARGET: ${{ secrets.EDAMAME_CORE_TARGET }}
      EDAMAME_CORE_SERVER: ${{ secrets.EDAMAME_CORE_SERVER }}
      EDAMAME_CA_PEM: ${{ secrets.EDAMAME_CA_PEM }}
      EDAMAME_CLIENT_PEM: ${{ secrets.EDAMAME_CLIENT_PEM }}
      EDAMAME_CLIENT_KEY: ${{ secrets.EDAMAME_CLIENT_KEY }}
      EDAMAME_SERVER_PEM: ${{ secrets.EDAMAME_SERVER_PEM }}
      EDAMAME_SERVER_KEY: ${{ secrets.EDAMAME_SERVER_KEY }}
      EDAMAME_CLIENT_CA_PEM: ${{ secrets.EDAMAME_CLIENT_CA_PEM }}
      LAMBDA_SIGNATURE: ${{ secrets.LAMBDA_SIGNATURE }}
      MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
      EDAMAME_LOG_LEVEL: debug

    steps:

      - name: Setup EDAMAME Posture (whitelist runner IP, checkout source)
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-native-${{ matrix.label }}
          checkout: true
          token: ${{ secrets.DEV_GITHUB_TOKEN }}
          wait_for_api: true
          wait_for_https: true

      - name: Configure Git Authentication to import private crates
        run: |
          git config --global user.email "dev@edamame.tech"
          git config --global user.name "EDAMAME Dev"
          git config --global url."https://edamamedev:${{ secrets.DEV_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install build dependencies (apt) for Linux
        if: matrix.os == 'ubuntu'
        shell: bash
        run: |
          # cargo test (basic_cargo_test.sh) compiles in test profile, so
          # we still need the full build dependency set on test runners.
          wait_for_apt_locks() {
            local TIMEOUT=300 TIME_PASSED=0
            local LOCK_FILES=("/var/lib/apt/lists/lock" "/var/lib/dpkg/lock-frontend" "/var/lib/dpkg/lock" "/var/cache/apt/archives/lock")
            while [ $TIME_PASSED -lt $TIMEOUT ]; do
              local LOCKED=false HAS_LOCK_CHECKER=false
              if command -v fuser >/dev/null 2>&1; then
                HAS_LOCK_CHECKER=true
                for lock_file in "${LOCK_FILES[@]}"; do
                  if [ -f "$lock_file" ] && sudo fuser "$lock_file" >/dev/null 2>&1; then
                    LOCKED=true; break
                  fi
                done
              fi
              if [ "$LOCKED" = "false" ] && command -v lsof >/dev/null 2>&1; then
                HAS_LOCK_CHECKER=true
                for lock_file in "${LOCK_FILES[@]}"; do
                  if [ -f "$lock_file" ] && sudo lsof "$lock_file" >/dev/null 2>&1; then
                    LOCKED=true; break
                  fi
                done
              fi
              if [ "$HAS_LOCK_CHECKER" = "false" ] || [ "$LOCKED" = "false" ]; then return 0; fi
              sleep 5; TIME_PASSED=$((TIME_PASSED + 5))
            done
            return 1
          }
          run_apt() {
            local MAX_ATTEMPTS=10 ATTEMPTS=0
            local PREFIX=""
            command -v sudo >/dev/null 2>&1 && PREFIX="sudo -E "
            while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              ATTEMPTS=$((ATTEMPTS + 1))
              wait_for_apt_locks || true
              if $PREFIX apt-get "$@"; then return 0; fi
              local RC=$?
              [ $RC -eq 100 ] && sudo dpkg --configure -a || true
              sleep 5
            done
            return 1
          }
          export DEBIAN_FRONTEND=noninteractive
          wait_for_apt_locks
          run_apt update -y
          run_apt install -y protobuf-compiler libpcap-dev pkg-config libgtk-3-dev
          run_apt install -y clang llvm libbpf-dev
          run_apt install -y "linux-headers-$(uname -r)"
          if [[ "${{ matrix.arch }}" == "aarch64" ]]; then
            run_apt install -y binutils-aarch64-linux-gnu
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies (Homebrew) for macOS
        if: matrix.os == 'macos'
        run: |
          brew install protobuf
          brew install wget

      - name: Setup .NET 8.0 for Windows
        if: matrix.os == 'windows'
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Install build dependencies (Chocolatey) for Windows
        if: matrix.os == 'windows'
        run: |
          choco install protoc wget

      - name: Configure Windows clang-cl toolchain
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $clang = 'C:\Program Files\LLVM\bin\clang-cl.exe'
          $llvmLib = 'C:\Program Files\LLVM\bin\llvm-lib.exe'
          if (!(Test-Path $clang) -or !(Test-Path $llvmLib)) {
            choco install llvm -y
          }
          if (!(Test-Path $clang) -or !(Test-Path $llvmLib)) {
            throw "LLVM Windows toolchain not found"
          }
          "CC_x86_64_pc_windows_msvc=$clang" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=$clang" >> $env:GITHUB_ENV
          "AR_x86_64_pc_windows_msvc=$llvmLib" >> $env:GITHUB_ENV

      - name: Download pre-built binary artifact
        uses: actions/download-artifact@v4
        with:
          name: posture-binary-${{ matrix.label }}
          path: posture-artifact

      - name: Install pre-built binary (Linux)
        if: matrix.os == 'ubuntu'
        shell: bash
        run: |
          mkdir -p target/release
          cp posture-artifact/edamame_posture target/release/edamame_posture
          chmod +x target/release/edamame_posture
          echo "BINARY_PATH=./target/release/edamame_posture" >> "$GITHUB_ENV"

      - name: Install pre-built binary (macOS, signed pkg)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          sudo installer -verboseR -pkg posture-artifact/edamame-posture.pkg -target /
          BUNDLE_PATH="/Library/Application Support/EDAMAME/EDAMAME-Posture/edamame_posture.app"
          test -d "$BUNDLE_PATH/Contents/MacOS"
          test -f "$BUNDLE_PATH/Contents/embedded.provisionprofile"
          test -L /usr/local/bin/edamame_posture
          codesign --verify --deep --strict --verbose=2 "$BUNDLE_PATH"
          # Mirror the Linux/Windows layout so test scripts that auto-discover
          # the binary via `find ./target` (standalone/integration/llm) work
          # the same way on macOS.
          mkdir -p target/release
          ln -sf /usr/local/bin/edamame_posture target/release/edamame_posture
          echo "BINARY_PATH=$(pwd)/target/release/edamame_posture" >> "$GITHUB_ENV"

      - name: Install pre-built binary (Windows, signed exe)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          mkdir -p target/release
          cp posture-artifact/edamame_posture.exe target/release/edamame_posture.exe
          echo "BINARY_PATH=./target/release/edamame_posture.exe" >> "$GITHUB_ENV"

      - name: Run eBPF Diagnostic Test
        id: ebpf_test
        if: matrix.os == 'ubuntu'
        shell: bash
        run: ./tests/ebpf_test.sh
        continue-on-error: true

      - name: Run Basic Cargo Tests
        id: cargo_tests
        shell: bash
        run: ./tests/basic_cargo_test.sh
        continue-on-error: true

      - name: Restart daemon with pre-built binary
        shell: bash
        run: |
          # The action installed the latest released daemon to handle
          # IP whitelisting; stop it now so the test suite runs against
          # the freshly built binary we just unpacked from the artifact.
          if [[ "$RUNNER_OS" == "Windows" || "$OS" == "Windows_NT" ]]; then
            taskkill //F //IM edamame_posture.exe 2>/dev/null || true
          else
            sudo pkill -9 edamame_posture 2>/dev/null || true
            if [[ "$RUNNER_OS" == "Linux" ]] && command -v systemctl >/dev/null 2>&1; then
              sudo systemctl stop edamame_posture.service 2>/dev/null || true
            fi
          fi
          sleep 2
          if pgrep -x edamame_posture >/dev/null 2>&1; then
            sudo pkill -9 edamame_posture 2>/dev/null || true
            sleep 1
          fi

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            codesign --verify --deep --strict --verbose=2 "$BINARY_PATH"
          fi

          echo "Starting daemon with pre-built binary: $BINARY_PATH"
          if [[ "$RUNNER_OS" == "Windows" || "$OS" == "Windows_NT" ]]; then
            "$BINARY_PATH" background-start-disconnected &
          else
            sudo -E "$BINARY_PATH" background-start-disconnected &
          fi
          sleep 3
          if pgrep -x edamame_posture >/dev/null 2>&1; then
            echo "Daemon started successfully"
            if [[ "$RUNNER_OS" == "Windows" || "$OS" == "Windows_NT" ]]; then
              "$BINARY_PATH" get-core-version 2>/dev/null || true
            else
              sudo -E "$BINARY_PATH" get-core-version 2>/dev/null || true
            fi
          else
            echo "Warning: daemon may not have started correctly"
          fi

      - name: Run Standalone Commands Test
        id: standalone_tests
        shell: bash
        run: ./tests/standalone_commands_test.sh
        continue-on-error: true

      - name: Run Integration Tests
        id: integration_tests
        shell: bash
        env:
          EDAMAME_USER: ${{ vars.EDAMAME_POSTURE_USER }}
          EDAMAME_DOMAIN: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          EDAMAME_PIN: ${{ secrets.EDAMAME_POSTURE_PIN }}
        run: ./tests/integration_test.sh
        continue-on-error: true

      - name: Run LLM Provider Tests
        id: llm_tests
        shell: bash
        run: ./tests/llm_test.sh
        continue-on-error: true

      - name: Slack alerts
        if: steps.ebpf_test.outcome == 'failure' || steps.cargo_tests.outcome == 'failure' || steps.standalone_tests.outcome == 'failure' || steps.integration_tests.outcome == 'failure' || steps.llm_tests.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Native Test Results for ${{ github.repository }} (${{ matrix.label }})*:
            - eBPF Test: ${{ steps.ebpf_test.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Cargo Tests: ${{ steps.cargo_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Standalone Tests: ${{ steps.standalone_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Integration Tests: ${{ steps.integration_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - LLM Tests: ${{ steps.llm_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Dump the logs (Non-Windows)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Dumping Native Logs (${{ matrix.label }}) --- "
          find . -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec sudo cat {} \; || echo "No logs found in default directory"
          if [ -d /var/log/edamame ]; then
            echo "--- Dumping /var/log/edamame/ ---"
            find /var/log/edamame -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec sudo cat {} \; || echo "No logs found in /var/log/edamame"
          fi
          echo "--- Native Log Dump Complete ---"

      - name: Dump the logs (Windows)
        if: always() && runner.os == 'Windows'
        shell: bash
        run: |
          echo "--- Dumping Native Logs (${{ matrix.label }}) --- "
          find . -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec cat {} \; || echo "No logs found in default directory"
          echo "--- Native Log Dump Complete ---"

      - name: Fail job if tests failed
        shell: bash
        if: steps.ebpf_test.outcome == 'failure' || steps.cargo_tests.outcome == 'failure' || steps.standalone_tests.outcome == 'failure' || steps.integration_tests.outcome == 'failure' || steps.llm_tests.outcome == 'failure'
        run: |
          echo "## Test Results Summary (Native - ${{ matrix.label }})"
          echo "- eBPF Test: ${{ steps.ebpf_test.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Cargo Tests: ${{ steps.cargo_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Standalone Tests: ${{ steps.standalone_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Integration Tests: ${{ steps.integration_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- LLM Tests: ${{ steps.llm_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo ""
          echo "Forcing native job to fail because tests did not succeed."
          exit 1

  # =========================================================================
  # test-container: build inside container, run general tests
  # (containers always build from source: host artifacts target a different
  #  libc/musl combination)
  # =========================================================================
  test-container:
    name: Container tests (${{ matrix.container_name }})
    needs: setup
    if: |
      needs.setup.outputs.run_tests == 'true' &&
      needs.setup.outputs.build_from_source == 'true' &&
      needs.setup.outputs.have_container == 'true'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.container_matrix) }}
    runs-on: ${{ matrix.runs_on }}
    container:
      image: ${{ matrix.container_image }}
      # Needed for integration tests (pcap) and eBPF (kprobes require SYS_ADMIN/BPF capabilities)
      options: --cap-add=NET_ADMIN --cap-add=NET_RAW --cap-add=SYS_ADMIN --cap-add=SYS_PTRACE --cap-add=BPF
    env:
      CARGO_TERM_COLOR: always
      EDAMAME_APP_SENTRY: ${{ secrets.EDAMAME_APP_SENTRY }}
      PWNED_API_KEY: ${{ secrets.PWNED_API_KEY }}
      EDAMAME_TARGET: ${{ secrets.EDAMAME_TARGET }}
      EDAMAME_SERVER: ${{ secrets.EDAMAME_SERVER }}
      EDAMAME_CORE_TARGET: ${{ secrets.EDAMAME_CORE_TARGET }}
      EDAMAME_CORE_SERVER: ${{ secrets.EDAMAME_CORE_SERVER }}
      EDAMAME_CA_PEM: ${{ secrets.EDAMAME_CA_PEM }}
      EDAMAME_CLIENT_PEM: ${{ secrets.EDAMAME_CLIENT_PEM }}
      EDAMAME_CLIENT_KEY: ${{ secrets.EDAMAME_CLIENT_KEY }}
      EDAMAME_SERVER_PEM: ${{ secrets.EDAMAME_SERVER_PEM }}
      EDAMAME_SERVER_KEY: ${{ secrets.EDAMAME_SERVER_KEY }}
      EDAMAME_CLIENT_CA_PEM: ${{ secrets.EDAMAME_CLIENT_CA_PEM }}
      LAMBDA_SIGNATURE: ${{ secrets.LAMBDA_SIGNATURE }}
      MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
      EDAMAME_LOG_LEVEL: debug

    steps:

      - name: Setup permissions for git and install missing packages (apk)
        if: ${{ contains(matrix.container_image, 'alpine') }}
        shell: sh
        run: |
          apk update
          # gtk+3.0 runtime is needed before the posture action tries to start the daemon
          apk add --no-cache build-base git curl bash sudo pkgconf gtk+3.0
          git config --global --add safe.directory '*'

      - name: Setup permissions for git and install missing packages (apt)
        if: ${{ !contains(matrix.container_image, 'alpine') }}
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          echo 'Acquire::ForceIPv4 "true";' > /etc/apt/apt.conf.d/99force-ipv4
          # In-process apt retries on individual URL fetch failures
          # (per-mirror transient drops). Independent of the outer
          # apt_retry() loop which retries the whole apt-get invocation.
          echo 'Acquire::Retries "5";' > /etc/apt/apt.conf.d/99retries

          # Note: archive.ubuntu.com / security.ubuntu.com still serve
          # bionic (18.04) and focal (20.04) Release files; do NOT
          # redirect to old-releases.ubuntu.com -- that mirror does NOT
          # have bionic at the standard /ubuntu/dists/<codename>/Release
          # path and returns 404. The original prep-step failures were
          # transient "Connection failed" drops to Canonical mirror IPs;
          # they resolve on retry with longer backoff.

          apt_retry() {
            local max=8 attempt=1
            while [ $attempt -le $max ]; do
              echo "apt-get $* (attempt $attempt/$max)"
              if apt-get "$@"; then return 0; fi
              local backoff=$(( attempt * 30 ))
              [ $backoff -gt 300 ] && backoff=300
              echo "Failed, sleeping ${backoff}s before retry..."
              sleep "$backoff"
              attempt=$((attempt + 1))
            done
            return 1
          }
          apt_retry update -y || apt_retry update -y --fix-missing
          apt_retry install -y --fix-missing git curl sudo wget jq bc ca-certificates gnupg libgtk-3-0
          git config --global --add safe.directory '*'

      - name: Setup EDAMAME Posture
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-container-${{ matrix.container_name }}
          checkout: false
          token: ${{ secrets.DEV_GITHUB_TOKEN }}
          wait_for_api: true
          wait_for_https: true

      - name: Configure Git Authentication to import private crates
        run: |
          git config --global user.email "dev@edamame.tech"
          git config --global user.name "EDAMAME Dev"
          git config --global url."https://edamamedev:${{ secrets.DEV_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Manual checkout for containers
        shell: bash
        run: |
          # actions/checkout@v4 requires node20 which is not supported on
          # older Ubuntu containers; clone manually instead.
          git config --global --add safe.directory '*'
          git clone https://github.com/${{ github.repository }}.git .
          git checkout "${{ github.head_ref || github.ref_name }}"

      - name: Install build dependencies (apk)
        if: ${{ contains(matrix.container_image, 'alpine') }}
        shell: sh
        run: |
          apk add --no-cache protobuf-dev eudev-dev
          apk add --no-cache clang llvm
          apk add --no-cache libbpf-dev linux-headers
          # aarch64 musl: build libpcap from source with -fPIC (mirrors
          # release_apks.yml). The apk libpcap.a is -fpic and references its
          # eproto_db table through the 15-bit R_AARCH64_LD64_GOTPAGE_LO15 GOT
          # form, which overflows once the native binary grows past ~32KB GOT.
          # The -fPIC build uses the large GOT model so the entry stays in range.
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            apk add --no-cache build-base perl flex bison wget
            cd /tmp
            wget https://www.tcpdump.org/release/libpcap-1.10.5.tar.gz
            tar xzf libpcap-1.10.5.tar.gz
            cd libpcap-1.10.5
            CFLAGS="-fPIC" ./configure --prefix=/usr --disable-shared --enable-static --disable-dbus
            make -j"$(nproc)"
            make install
          else
            apk add --no-cache libpcap-dev
          fi

      - name: Install build dependencies (apt)
        if: ${{ !contains(matrix.container_image, 'alpine') }}
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          # Same retry / --fix-missing pattern as the prep step above so the
          # focal (20.04) build doesn't trip on transient archive.ubuntu.com
          # connection failures during package fetch.
          apt_retry() {
            local max=5 attempt=1
            while [ $attempt -le $max ]; do
              echo "apt-get $* (attempt $attempt/$max)"
              if apt-get "$@"; then return 0; fi
              echo "Failed, retrying in $((attempt * 10))s..."
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
            return 1
          }
          apt_retry update -y || apt_retry update -y --fix-missing
          apt_retry install -y --fix-missing protobuf-compiler libpcap-dev psmisc pkg-config libgtk-3-dev
          apt_retry install -y --fix-missing clang llvm
          apt_retry install -y --fix-missing libbpf-dev || true

      - name: Install Rust toolchain
        shell: bash
        run: |
          if [ -f /etc/alpine-release ]; then
            apk add --no-cache build-base
          fi
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build application
        shell: bash
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "=== eBPF Build Environment ==="
          echo "clang: $(which clang 2>/dev/null || echo 'NOT FOUND')"
          clang --version 2>/dev/null | head -1 || echo "clang not available"
          echo "libbpf headers: $(ls /usr/include/bpf/bpf_helpers.h 2>/dev/null || echo 'NOT FOUND')"
          cargo build --release 2>&1 | tee /tmp/build.log
          echo "=== eBPF Build Messages ==="
          grep -iE "eBPF|l7_ebpf" /tmp/build.log | head -30 || echo "(no eBPF messages)"

      - name: Run eBPF Diagnostic Test
        id: ebpf_test
        shell: bash
        run: ./tests/ebpf_test.sh
        continue-on-error: true

      - name: Run Basic Cargo Tests
        id: cargo_tests
        shell: bash
        run: ./tests/basic_cargo_test.sh
        continue-on-error: true
        env:
          SUDO_CMD: ""

      - name: Restart daemon with freshly built binary
        shell: bash
        run: |
          pkill -9 edamame_posture 2>/dev/null || true
          sleep 2
          if pgrep -x edamame_posture >/dev/null 2>&1; then
            pkill -9 edamame_posture 2>/dev/null || true
            sleep 1
          fi
          BINARY_PATH="./target/release/edamame_posture"
          "$BINARY_PATH" background-start-disconnected &
          sleep 3
          if pgrep -x edamame_posture >/dev/null 2>&1; then
            echo "Daemon started successfully with freshly built binary"
            "$BINARY_PATH" get-core-version 2>/dev/null || true
          else
            echo "Warning: daemon may not have started correctly"
          fi

      - name: Run Standalone Commands Test
        id: standalone_tests
        shell: bash
        run: ./tests/standalone_commands_test.sh
        continue-on-error: true

      - name: Run Integration Tests
        id: integration_tests
        shell: bash
        env:
          EDAMAME_USER: ${{ vars.EDAMAME_POSTURE_USER }}
          EDAMAME_DOMAIN: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          EDAMAME_PIN: ${{ secrets.EDAMAME_POSTURE_PIN }}
          SUDO_CMD: ""
        run: ./tests/integration_test.sh
        continue-on-error: true

      - name: Run LLM Provider Tests
        id: llm_tests
        shell: bash
        env:
          SUDO_CMD: ""
        run: ./tests/llm_test.sh
        continue-on-error: true

      - name: Dump the logs
        shell: bash
        if: always()
        run: |
          echo "--- Dumping Container Logs (${{ matrix.container_name }}) --- "
          find . -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec sudo cat {} \; || echo "No logs found in default directory"
          if [ -d /var/log/edamame ]; then
            echo "--- Dumping /var/log/edamame/ ---"
            find /var/log/edamame -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec sudo cat {} \; || echo "No logs found in /var/log/edamame"
          fi
          echo "--- Container Log Dump Complete ---"

      - name: Slack alerts
        # Won't work on 18.04 because of glibc version
        # Won't work on ARM64 Alpine because of JavaScript support
        if: (steps.ebpf_test.outcome == 'failure' || steps.cargo_tests.outcome == 'failure' || steps.standalone_tests.outcome == 'failure' || steps.integration_tests.outcome == 'failure' || steps.llm_tests.outcome == 'failure') && !contains(matrix.container_name, '18.04') && !contains(matrix.container_name, 'aarch64-musl')
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Container Test Results for ${{ github.repository }} (${{ matrix.container_name }})*:
            - eBPF Test: ${{ steps.ebpf_test.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Cargo Tests: ${{ steps.cargo_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Standalone Tests: ${{ steps.standalone_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Integration Tests: ${{ steps.integration_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - LLM Tests: ${{ steps.llm_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Fail job if tests failed
        shell: bash
        # eBPF test failure is ignored on Ubuntu 18.04 (doesn't support eBPF well)
        if: (steps.ebpf_test.outcome == 'failure' && !contains(matrix.container_name, '18.04')) || steps.cargo_tests.outcome == 'failure' || steps.standalone_tests.outcome == 'failure' || steps.integration_tests.outcome == 'failure' || steps.llm_tests.outcome == 'failure'
        run: |
          echo "## Test Results Summary (Container - ${{ matrix.container_name }})"
          echo "- eBPF Test: ${{ steps.ebpf_test.outcome != 'failure' && '✅ Success' || (contains(matrix.container_name, '18.04') && '⚠️ Ignored (18.04)' || '❌ Failed') }}"
          echo "- Cargo Tests: ${{ steps.cargo_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Standalone Tests: ${{ steps.standalone_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Integration Tests: ${{ steps.integration_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- LLM Tests: ${{ steps.llm_tests.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo ""
          echo "Forcing container job to fail because tests did not succeed."
          exit 1

  # =========================================================================
  # perf: per-platform performance scenarios
  # uses pre-built artifact when build_from_source=true; otherwise installs
  # the latest released binary via edamame_posture_action.
  # =========================================================================
  perf:
    name: Perf (${{ matrix.label }})
    needs: [setup, build]
    if: |
      always() && needs.setup.result == 'success' &&
      needs.setup.outputs.run_perf == 'true' &&
      needs.setup.outputs.have_native == 'true' &&
      (needs.setup.outputs.build_from_source != 'true' || needs.build.result == 'success' || needs.setup.outputs.reuse_build_run_id != '')
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.native_matrix) }}
    runs-on: ${{ matrix.runs_on }}

    env:
      EDAMAME_APP_SENTRY: ${{ secrets.EDAMAME_APP_SENTRY }}
      PWNED_API_KEY: ${{ secrets.PWNED_API_KEY }}
      EDAMAME_TARGET: ${{ secrets.EDAMAME_TARGET }}
      EDAMAME_CORE_TARGET: ${{ secrets.EDAMAME_CORE_TARGET }}
      EDAMAME_CORE_SERVER: ${{ secrets.EDAMAME_CORE_SERVER }}
      EDAMAME_CA_PEM: ${{ secrets.EDAMAME_CA_PEM }}
      EDAMAME_CLIENT_PEM: ${{ secrets.EDAMAME_CLIENT_PEM }}
      EDAMAME_CLIENT_KEY: ${{ secrets.EDAMAME_CLIENT_KEY }}
      EDAMAME_SERVER_PEM: ${{ secrets.EDAMAME_SERVER_PEM }}
      EDAMAME_SERVER_KEY: ${{ secrets.EDAMAME_SERVER_KEY }}
      EDAMAME_CLIENT_CA_PEM: ${{ secrets.EDAMAME_CLIENT_CA_PEM }}
      LAMBDA_SIGNATURE: ${{ secrets.LAMBDA_SIGNATURE }}
      MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
      EDAMAME_POSTURE_USER: ${{ vars.EDAMAME_POSTURE_USER }}
      EDAMAME_POSTURE_DOMAIN: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
      EDAMAME_POSTURE_PIN: ${{ secrets.EDAMAME_POSTURE_PIN }}
      DURATION_SECONDS: ${{ needs.setup.outputs.perf_duration_seconds }}
      SCENARIOS: ${{ needs.setup.outputs.perf_scenarios }}
      BUILD_FROM_SOURCE: ${{ needs.setup.outputs.build_from_source }}

    steps:

      - name: Setup EDAMAME Posture (whitelist runner IP, checkout source)
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-perf-${{ matrix.label }}
          checkout: true
          token: ${{ secrets.DEV_GITHUB_TOKEN }}
          wait_for_api: true
          wait_for_https: true

      - name: Configure Git Authentication to import private crates
        run: |
          git config --global user.email "dev@edamame.tech"
          git config --global user.name "EDAMAME Dev"
          git config --global url."https://edamamedev:${{ secrets.DEV_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download pre-built binary artifact
        if: env.BUILD_FROM_SOURCE == 'true'
        uses: actions/download-artifact@v4
        with:
          name: posture-binary-${{ matrix.label }}
          path: posture-artifact
          run-id: ${{ needs.setup.outputs.reuse_build_run_id != '' && needs.setup.outputs.reuse_build_run_id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Install pre-built binary (Linux)
        if: env.BUILD_FROM_SOURCE == 'true' && matrix.os == 'ubuntu'
        shell: bash
        run: |
          mkdir -p target/release
          cp posture-artifact/edamame_posture target/release/edamame_posture
          chmod +x target/release/edamame_posture
          echo "BINARY_PATH=$(pwd)/target/release/edamame_posture" >> "$GITHUB_ENV"

      - name: Install pre-built binary (macOS, signed pkg)
        if: env.BUILD_FROM_SOURCE == 'true' && matrix.os == 'macos'
        shell: bash
        run: |
          sudo installer -verboseR -pkg posture-artifact/edamame-posture.pkg -target /
          BUNDLE_PATH="/Library/Application Support/EDAMAME/EDAMAME-Posture/edamame_posture.app"
          test -d "$BUNDLE_PATH/Contents/MacOS"
          test -f "$BUNDLE_PATH/Contents/embedded.provisionprofile"
          test -L /usr/local/bin/edamame_posture
          codesign --verify --deep --strict --verbose=2 "$BUNDLE_PATH"
          mkdir -p target/release
          ln -sf /usr/local/bin/edamame_posture target/release/edamame_posture
          echo "BINARY_PATH=$(pwd)/target/release/edamame_posture" >> "$GITHUB_ENV"

      - name: Install pre-built binary (Windows, signed exe)
        if: env.BUILD_FROM_SOURCE == 'true' && matrix.os == 'windows'
        shell: bash
        run: |
          mkdir -p target/release
          cp posture-artifact/edamame_posture.exe target/release/edamame_posture.exe
          echo "BINARY_PATH=$(pwd)/target/release/edamame_posture.exe" >> "$GITHUB_ENV"

      - name: Locate action-installed binary (released binary path)
        if: env.BUILD_FROM_SOURCE != 'true'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BIN_PATH=$(command -v edamame_posture.exe || true)
          else
            BIN_PATH=$(command -v edamame_posture || true)
            if [[ -z "$BIN_PATH" && -x /usr/local/bin/edamame_posture ]]; then
              BIN_PATH=/usr/local/bin/edamame_posture
            fi
          fi
          if [[ -z "$BIN_PATH" ]]; then
            echo "ERROR: action-installed edamame_posture binary not found" >&2
            exit 1
          fi
          echo "Using released binary at $BIN_PATH"
          echo "BINARY_PATH=$BIN_PATH" >> "$GITHUB_ENV"

      - name: Restart daemon with chosen binary (build_from_source only)
        if: env.BUILD_FROM_SOURCE == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -e "$BINARY_PATH" ]]; then
            echo "ERROR: $BINARY_PATH not found" >&2
            exit 1
          fi
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            taskkill //F //IM edamame_posture.exe 2>/dev/null || true
          else
            sudo pkill -9 edamame_posture 2>/dev/null || true
            if [[ "$RUNNER_OS" == "Linux" ]] && command -v systemctl >/dev/null 2>&1; then
              sudo systemctl stop edamame_posture.service 2>/dev/null || true
            fi
          fi
          sleep 2
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            codesign --verify --deep --strict --verbose=2 "$BINARY_PATH"
          fi
          "$BINARY_PATH" get-core-version

      - name: Export EDAMAME_POSTURE_BIN
        shell: bash
        run: |
          echo "EDAMAME_POSTURE_BIN=$BINARY_PATH" >> "$GITHUB_ENV"
          echo "binary path: $BINARY_PATH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install psutil==5.9.8 blake3==0.4.1

      - name: Calibrate CPU
        id: calibrate
        shell: bash
        run: |
          mkdir -p "results/${{ matrix.label }}"
          python3 tests/perf/calibrate.py \
            --budget 3.0 \
            --output "results/${{ matrix.label }}/calibration.json"
          cat "results/${{ matrix.label }}/calibration.json"
        continue-on-error: true

      - name: Run performance scenarios
        id: scenarios
        shell: bash
        env:
          PYTHON: python3
        run: |
          set -u
          any_fail=0
          IFS=',' read -r -a scen_list <<<"${SCENARIOS}"
          for scen in "${scen_list[@]}"; do
            scen="${scen// /}"
            [[ -z "$scen" ]] && continue
            echo "::group::scenario=$scen duration=${DURATION_SECONDS}s"
            if bash tests/perf/run_scenario.sh \
                --scenario "$scen" \
                --duration "${DURATION_SECONDS}" \
                --output-dir "results/${{ matrix.label }}/$scen"; then
              echo "::endgroup::"
            else
              echo "scenario $scen FAILED on ${{ matrix.label }}"
              echo "::endgroup::"
              any_fail=1
            fi
          done
          exit "$any_fail"
        continue-on-error: true

      - name: Sanitize logs
        if: always()
        shell: bash
        run: |
          find "results/${{ matrix.label }}" -type f \( -name '*.log' -o -name '*.txt' \) -print0 \
            | xargs -0 python3 tests/common/sanitize_logs.py || true

      - name: Upload platform results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ matrix.label }}
          path: results/${{ matrix.label }}
          if-no-files-found: warn
          retention-days: 30

      - name: Slack alerts
        if: steps.calibrate.outcome == 'failure' || steps.scenarios.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Performance Test Results for ${{ github.repository }} (${{ matrix.label }})*:
            - CPU Calibration: ${{ steps.calibrate.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Performance Scenarios: ${{ steps.scenarios.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Dump the logs (Non-Windows)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Dumping Native Logs (${{ matrix.label }}) --- "
          find . -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec sudo cat {} \; || echo "No logs found in default directory"
          if [ -d /var/log/edamame ]; then
            echo "--- Dumping /var/log/edamame/ ---"
            find /var/log/edamame -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec sudo cat {} \; || echo "No logs found in /var/log/edamame"
          fi
          echo "--- Native Log Dump Complete ---"

      - name: Dump the logs (Windows)
        if: always() && runner.os == 'Windows'
        shell: bash
        run: |
          echo "--- Dumping Native Logs (${{ matrix.label }}) --- "
          find . -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec cat {} \; || echo "No logs found in default directory"
          echo "--- Native Log Dump Complete ---"

      - name: Fail job if tests failed
        shell: bash
        if: steps.calibrate.outcome == 'failure' || steps.scenarios.outcome == 'failure'
        run: |
          echo "## Performance Results Summary (${{ matrix.label }})"
          echo "- CPU Calibration: ${{ steps.calibrate.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Performance Scenarios: ${{ steps.scenarios.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo ""
          echo "Forcing performance job to fail because tests did not succeed."
          exit 1

  # =========================================================================
  # security: per-platform CVE detection
  # =========================================================================
  security:
    name: Security/CVE (${{ matrix.label }})
    needs: [setup, build]
    if: |
      always() && needs.setup.result == 'success' &&
      needs.setup.outputs.run_security == 'true' &&
      needs.setup.outputs.have_native == 'true' &&
      (needs.setup.outputs.build_from_source != 'true' || needs.build.result == 'success' || needs.setup.outputs.reuse_build_run_id != '')
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.native_matrix) }}
    runs-on: ${{ matrix.runs_on }}

    env:
      EDAMAME_APP_SENTRY: ${{ secrets.EDAMAME_APP_SENTRY }}
      PWNED_API_KEY: ${{ secrets.PWNED_API_KEY }}
      EDAMAME_TARGET: ${{ secrets.EDAMAME_TARGET }}
      EDAMAME_CORE_TARGET: ${{ secrets.EDAMAME_CORE_TARGET }}
      EDAMAME_CORE_SERVER: ${{ secrets.EDAMAME_CORE_SERVER }}
      EDAMAME_CA_PEM: ${{ secrets.EDAMAME_CA_PEM }}
      EDAMAME_CLIENT_PEM: ${{ secrets.EDAMAME_CLIENT_PEM }}
      EDAMAME_CLIENT_KEY: ${{ secrets.EDAMAME_CLIENT_KEY }}
      EDAMAME_SERVER_PEM: ${{ secrets.EDAMAME_SERVER_PEM }}
      EDAMAME_SERVER_KEY: ${{ secrets.EDAMAME_SERVER_KEY }}
      EDAMAME_CLIENT_CA_PEM: ${{ secrets.EDAMAME_CLIENT_CA_PEM }}
      LAMBDA_SIGNATURE: ${{ secrets.LAMBDA_SIGNATURE }}
      MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
      EDAMAME_POSTURE_USER: ${{ vars.EDAMAME_POSTURE_USER }}
      EDAMAME_POSTURE_DOMAIN: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
      EDAMAME_POSTURE_PIN: ${{ secrets.EDAMAME_POSTURE_PIN }}
      TRIGGER_DURATION: ${{ needs.setup.outputs.security_trigger_duration }}
      READINESS_WAIT: ${{ needs.setup.outputs.security_readiness_wait }}
      POLL_ATTEMPTS: ${{ needs.setup.outputs.security_poll_attempts }}
      POLL_INTERVAL: ${{ needs.setup.outputs.security_poll_interval }}
      SCENARIOS: ${{ needs.setup.outputs.security_scenarios }}
      BUILD_FROM_SOURCE: ${{ needs.setup.outputs.build_from_source }}

    steps:

      - name: Setup EDAMAME Posture (whitelist runner IP, checkout source)
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-security-${{ matrix.label }}
          checkout: true
          token: ${{ secrets.DEV_GITHUB_TOKEN }}
          wait_for_api: true
          wait_for_https: true

      - name: Configure Git Authentication to import private crates
        run: |
          git config --global user.email "dev@edamame.tech"
          git config --global user.name "EDAMAME Dev"
          git config --global url."https://edamamedev:${{ secrets.DEV_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download pre-built binary artifact
        if: env.BUILD_FROM_SOURCE == 'true'
        uses: actions/download-artifact@v4
        with:
          name: posture-binary-${{ matrix.label }}
          path: posture-artifact
          run-id: ${{ needs.setup.outputs.reuse_build_run_id != '' && needs.setup.outputs.reuse_build_run_id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Install pre-built binary (Linux)
        if: env.BUILD_FROM_SOURCE == 'true' && matrix.os == 'ubuntu'
        shell: bash
        run: |
          mkdir -p target/release
          cp posture-artifact/edamame_posture target/release/edamame_posture
          chmod +x target/release/edamame_posture
          echo "BINARY_PATH=$(pwd)/target/release/edamame_posture" >> "$GITHUB_ENV"

      - name: Install pre-built binary (macOS, signed pkg)
        if: env.BUILD_FROM_SOURCE == 'true' && matrix.os == 'macos'
        shell: bash
        run: |
          sudo installer -verboseR -pkg posture-artifact/edamame-posture.pkg -target /
          BUNDLE_PATH="/Library/Application Support/EDAMAME/EDAMAME-Posture/edamame_posture.app"
          test -d "$BUNDLE_PATH/Contents/MacOS"
          test -f "$BUNDLE_PATH/Contents/embedded.provisionprofile"
          test -L /usr/local/bin/edamame_posture
          codesign --verify --deep --strict --verbose=2 "$BUNDLE_PATH"
          mkdir -p target/release
          ln -sf /usr/local/bin/edamame_posture target/release/edamame_posture
          echo "BINARY_PATH=$(pwd)/target/release/edamame_posture" >> "$GITHUB_ENV"

      - name: Install pre-built binary (Windows, signed exe)
        if: env.BUILD_FROM_SOURCE == 'true' && matrix.os == 'windows'
        shell: bash
        run: |
          mkdir -p target/release
          cp posture-artifact/edamame_posture.exe target/release/edamame_posture.exe
          echo "BINARY_PATH=$(pwd)/target/release/edamame_posture.exe" >> "$GITHUB_ENV"

      - name: Locate action-installed binary (released binary path)
        if: env.BUILD_FROM_SOURCE != 'true'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BIN_PATH=$(command -v edamame_posture.exe || true)
          else
            BIN_PATH=$(command -v edamame_posture || true)
            if [[ -z "$BIN_PATH" && -x /usr/local/bin/edamame_posture ]]; then
              BIN_PATH=/usr/local/bin/edamame_posture
            fi
          fi
          if [[ -z "$BIN_PATH" ]]; then
            echo "ERROR: action-installed edamame_posture binary not found" >&2
            exit 1
          fi
          echo "Using released binary at $BIN_PATH"
          echo "BINARY_PATH=$BIN_PATH" >> "$GITHUB_ENV"

      - name: Restart daemon with chosen binary (packet-capture, disconnected)
        shell: bash
        env:
          EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
        run: |
          set -euo pipefail
          if [[ ! -e "$BINARY_PATH" ]]; then
            echo "ERROR: $BINARY_PATH not found" >&2
            exit 1
          fi
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            POSTURE_CMD="$BINARY_PATH"
          else
            if [[ $(id -u) -eq 0 ]]; then
              POSTURE_CMD="$BINARY_PATH"
            elif command -v sudo >/dev/null 2>&1; then
              POSTURE_CMD="sudo -E $BINARY_PATH"
            else
              POSTURE_CMD="$BINARY_PATH"
            fi
          fi

          echo "EDAMAME_BINARY_PATH=$BINARY_PATH" >> "$GITHUB_ENV"
          echo "EDAMAME_POSTURE=$BINARY_PATH" >> "$GITHUB_ENV"
          echo "EDAMAME_POSTURE_CMD=$POSTURE_CMD" >> "$GITHUB_ENV"

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            codesign --verify --deep --strict --verbose=2 "$BINARY_PATH"
          fi

          # Stop the daemon installed by edamame_posture_action so the
          # CVE detection suite runs against the chosen binary (either
          # the freshly built one or the released one - both need the
          # disconnected/packet-capture mode the suite expects).
          $POSTURE_CMD stop >/dev/null 2>&1 || true
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            taskkill //F //IM edamame_posture.exe 2>/dev/null || true
          else
            sudo pkill -9 edamame_posture 2>/dev/null || true
            if [[ "$RUNNER_OS" == "Linux" ]] && command -v systemctl >/dev/null 2>&1; then
              sudo systemctl stop edamame_posture.service >/dev/null 2>&1 || true
            fi
          fi
          sleep 2

          $POSTURE_CMD background-start-disconnected --packet-capture
          sleep 3
          $POSTURE_CMD background-status || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install edamame_cli
        id: install_cli
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          install_cli() {
            if [ "$RUNNER_OS" = "Windows" ]; then
              curl --proto '=https' --tlsv1.2 -sSf \
                https://raw.githubusercontent.com/edamametechnologies/edamame_cli/main/install.sh \
                | sh -s -- --force-binary
            else
              curl --proto '=https' --tlsv1.2 -sSf \
                https://raw.githubusercontent.com/edamametechnologies/edamame_cli/main/install.sh \
                | sudo -E sh -s --
            fi
          }
          for attempt in 1 2 3; do
            if install_cli; then
              echo "install attempt $attempt succeeded"
              break
            fi
            echo "install attempt $attempt failed, sleeping before retry"
            sleep $((attempt * 10))
          done
          if [ "$RUNNER_OS" = "Windows" ]; then
            EC=$(command -v edamame_cli.exe 2>/dev/null || command -v edamame_cli 2>/dev/null || echo "$HOME/edamame_cli.exe")
          else
            EC=$(command -v edamame_cli 2>/dev/null || echo /usr/local/bin/edamame_cli)
          fi
          echo "EDAMAME_CLI=$EC" >> "$GITHUB_ENV"
          "$EC" --version

      - name: Download CVE trigger scripts
        id: triggers
        shell: bash
        run: |
          set -euo pipefail
          TRIGGERS_DIR="${RUNNER_TEMP:-/tmp}/cve_triggers"
          mkdir -p "$TRIGGERS_DIR"
          BASE_URL="https://raw.githubusercontent.com/edamametechnologies/agent_security/main/tests/e2e/triggers"
          REQUIRED_FILES=(
            _common.py
            _native_udp_probe.py
            _edamame_cli.py
            cleanup.py
            trigger_blacklist_comm.py
            trigger_cve_token_exfil.py
            trigger_cve_sandbox_escape.py
            trigger_memory_poisoning.py
            trigger_credential_sprawl.py
            trigger_supply_chain_exfil.py
            trigger_npm_rat_beacon.py
            trigger_file_events.py
          )
          for f in "${REQUIRED_FILES[@]}"; do
            # --retry-all-errors so curl also retries HTTP 429 (raw.githubusercontent.com
            # rate-limits shared hosted-runner egress IPs); plain --retry does not cover 429.
            curl --retry 6 --retry-delay 3 --retry-all-errors --retry-connrefused -fsSL "$BASE_URL/$f" -o "$TRIGGERS_DIR/$f"
            test -s "$TRIGGERS_DIR/$f"
          done
          echo "CVE_TRIGGERS_DIR=$TRIGGERS_DIR" >> "$GITHUB_ENV"
          echo "Downloaded ${#REQUIRED_FILES[@]} trigger files"
          ls -la "$TRIGGERS_DIR"

      - name: Install Python deps for triggers
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Verify daemon and capture readiness
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            "$EDAMAME_POSTURE" background-status || true
          else
            sudo -E "$EDAMAME_POSTURE" background-status || true
          fi
          "$EDAMAME_CLI" rpc get_core_version || true

      - name: Run false-positive baseline (10 min idle)
        id: baseline
        # Must complete (including optional anomaly warm-up, setup, and
        # tear down) within ~15 minutes. Baseline itself waits 600s; the
        # remainder is pre-baseline warm-up on macOS, settle, and final
        # sweep.
        timeout-minutes: 15
        shell: bash
        env:
          EDAMAME_CLI: ${{ env.EDAMAME_CLI }}
        run: |
          WARMUP_DURATION=0
          WARMUP_SETTLE=15
          # macOS occasionally under-trains the anomaly model when the
          # runner begins completely idle, so seed it with short-lived
          # benign HTTPS traffic before the no-stimulus gate starts. We
          # then clear history and enforce the full 10-minute idle
          # window as usual.
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            WARMUP_DURATION=120
          fi
          mkdir -p "results/${{ matrix.label }}"
          bash tests/security/run_false_positive_baseline.sh \
            --triggers-dir "$CVE_TRIGGERS_DIR" \
            --output-dir "results/${{ matrix.label }}" \
            --duration 600 \
            --tick-interval 60 \
            --anomaly-warmup-duration "$WARMUP_DURATION" \
            --anomaly-warmup-settle "$WARMUP_SETTLE"
        continue-on-error: true

      - name: Run CVE detection suite
        id: detection
        # If the idle baseline detected a false positive, the CVE
        # regression suite MUST NOT run. A dirty baseline means the
        # detector is already emitting findings with no stimulus, which
        # would taint every subsequent scenario verdict.
        if: steps.baseline.outcome == 'success'
        timeout-minutes: 60
        shell: bash
        env:
          EDAMAME_CLI: ${{ env.EDAMAME_CLI }}
        run: |
          mkdir -p "results/${{ matrix.label }}"
          # Timing parameters track the canonical agent_security harness
          # (tests/e2e/run_e2e_harness.sh) so behavior matches what the
          # plugin E2E workflows already validate end-to-end.
          bash tests/security/run_cve_detection.sh \
            --triggers-dir "$CVE_TRIGGERS_DIR" \
            --output-dir "results/${{ matrix.label }}" \
            --trigger-duration "${TRIGGER_DURATION}" \
            --post-wait 5 \
            --poll-attempts "${POLL_ATTEMPTS}" \
            --poll-interval "${POLL_INTERVAL}" \
            --readiness-wait "${READINESS_WAIT}" \
            --agent-type "openclaw" \
            --scenarios "${SCENARIOS}"
          echo "--- results summary ---"
          cat "results/${{ matrix.label }}/results.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d['totals'], indent=2))"
        continue-on-error: true

      - name: Collect edamame_posture daemon log
        if: always()
        shell: bash
        run: |
          LOG_DEST="results/${{ matrix.label }}/daemon-logs"
          mkdir -p "$LOG_DEST"
          # edamame_foundation's logger writes rolling files named
          # "edamame_posture_<PID>.YYYY-MM-DD" (no .log extension). On
          # Unix the preferred dir is /var/log/edamame; on Windows the
          # logger falls back to the directory of the running executable.
          case "$RUNNER_OS" in
            Linux)
              if [[ -d /var/log/edamame ]]; then
                sudo cp -a /var/log/edamame/. "$LOG_DEST/" 2>/dev/null || true
                sudo chmod -R +r "$LOG_DEST" 2>/dev/null || true
              fi
              ;;
            macOS)
              if [[ -d /var/log/edamame ]]; then
                sudo cp -a /var/log/edamame/. "$LOG_DEST/" 2>/dev/null || true
                sudo chmod -R +r "$LOG_DEST" 2>/dev/null || true
              fi
              ;;
            Windows)
              BIN_DIR=$(dirname "${EDAMAME_BINARY_PATH:-}")
              if [[ -n "$BIN_DIR" && -d "$BIN_DIR" ]]; then
                find "$BIN_DIR" -maxdepth 1 -type f \
                  \( -name 'edamame_posture_*' -o -name 'edamame_posture*.log*' \) \
                  -print0 \
                  | xargs -0 -I {} cp "{}" "$LOG_DEST/" 2>/dev/null || true
              fi
              ;;
          esac
          echo "--- daemon-logs contents ---"
          ls -la "$LOG_DEST" 2>/dev/null || true
          echo "--- daemon-logs vdiag grep (first 200 lines) ---"
          find "$LOG_DEST" -type f -print0 2>/dev/null \
            | xargs -0 -r grep -hE '(vdiag|token_exfil|sandbox|live_sensitive)' 2>/dev/null \
            | head -200 || true

      - name: Sanitize logs
        if: always()
        shell: bash
        run: |
          find "results/${{ matrix.label }}" -type f \( -name '*.log' -o -name '*.json' -o -name '*.ndjson' \) -print0 \
            | xargs -0 python3 tests/common/sanitize_logs.py || true

      # CVE scenarios deliberately fire `HIGH`/`CRITICAL` vulnerability
      # findings (xmrig/exfil under /tmp/.hidden, credential sprawl, token
      # exfiltration, etc.). These persist in the daemon's
      # `agentic_config.json` and would be picked up by ANY subsequent job
      # on the same runner that calls `vulnerability-status
      # --fail-on-findings` (the runner-protection gate that all release,
      # test, and signing workflows now use). The cluster of github-hosted
      # runners we use here is ephemeral, but if any of these matrix legs
      # ever lands on a self-hosted runner the persisted findings would
      # leak into the next job. Clear the vuln history at the end of every
      # security run so the next job sees a clean state.
      - name: Clear runtime vulnerability state (test artifacts)
        if: always()
        shell: bash
        env:
          EDAMAME_CLI: ${{ env.EDAMAME_CLI }}
        run: |
          if [[ -z "${EDAMAME_CLI:-}" ]] || ! command -v "$EDAMAME_CLI" >/dev/null 2>&1; then
            echo "edamame_cli not available; skipping runtime cleanup."
            exit 0
          fi
          echo "Clearing all runtime vulnerability findings (test scenarios)..."
          "$EDAMAME_CLI" rpc clear_vulnerability_history || true
          "$EDAMAME_CLI" rpc reset_vulnerability_suppressions || true
          echo "After cleanup:"
          "$EDAMAME_CLI" rpc get_vulnerability_detector_status --pretty || true

      - name: Upload platform results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-${{ matrix.label }}
          path: results/${{ matrix.label }}
          if-no-files-found: warn
          retention-days: 30

      - name: Slack alerts
        if: steps.install_cli.outcome == 'failure' || steps.triggers.outcome == 'failure' || steps.baseline.outcome == 'failure' || steps.detection.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Security (CVE) Test Results for ${{ github.repository }} (${{ matrix.label }})*:
            - edamame_cli install: ${{ steps.install_cli.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Trigger fetch: ${{ steps.triggers.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - False-positive baseline (10 min idle): ${{ steps.baseline.outcome == 'success' && '✅ Clean' || '❌ Findings during idle window (release blocked)' }}
            - CVE Detection Suite: ${{ steps.detection.outcome == 'success' && '✅ Success' || (steps.detection.outcome == 'skipped' && '⏭️ Skipped (baseline dirty)' || '❌ Failed') }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Dump the logs (Non-Windows)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Dumping Native Logs (${{ matrix.label }}) --- "
          find . -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec sudo cat {} \; || echo "No logs found in default directory"
          if [ -d /var/log/edamame ]; then
            echo "--- Dumping /var/log/edamame/ ---"
            find /var/log/edamame -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec sudo cat {} \; || echo "No logs found in /var/log/edamame"
          fi
          echo "--- Native Log Dump Complete ---"

      - name: Dump the logs (Windows)
        if: always() && runner.os == 'Windows'
        shell: bash
        run: |
          echo "--- Dumping Native Logs (${{ matrix.label }}) --- "
          find . -name "edamame_*.2*-*-*" -exec echo "--- {} ---" \; -exec cat {} \; || echo "No logs found in default directory"
          echo "--- Native Log Dump Complete ---"

      - name: Fail job if tests failed
        shell: bash
        if: steps.install_cli.outcome == 'failure' || steps.triggers.outcome == 'failure' || steps.baseline.outcome == 'failure' || steps.detection.outcome == 'failure'
        run: |
          echo "## Security Results Summary (${{ matrix.label }})"
          echo "- edamame_cli install: ${{ steps.install_cli.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Trigger fetch: ${{ steps.triggers.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- False-positive baseline (10 min idle): ${{ steps.baseline.outcome == 'success' && '✅ Clean' || '❌ Findings during idle window (release blocked)' }}"
          echo "- CVE Detection Suite: ${{ steps.detection.outcome == 'success' && '✅ Success' || (steps.detection.outcome == 'skipped' && '⏭️ Skipped (baseline dirty)' || '❌ Failed') }}"
          echo ""
          if [[ "${{ steps.baseline.outcome }}" == "failure" ]]; then
            echo "The 10-minute idle baseline observed vulnerability findings."
            echo "A clean runner with no attack trigger MUST produce zero"
            echo "findings; anything surfacing during that window is a false"
            echo "positive and blocks the release. See baseline.json in the"
            echo "uploaded artifact for per-sample detail."
          fi
          echo ""
          echo "Forcing security job to fail because tests did not succeed."
          exit 1

  # =========================================================================
  # perf-report: consolidate per-platform perf results, enforce regression gate
  # =========================================================================
  perf-report:
    name: Perf report (consolidate + gate)
    needs: [setup, perf]
    if: |
      always() && needs.setup.result == 'success' &&
      needs.setup.outputs.run_perf == 'true' &&
      needs.setup.outputs.have_native == 'true' &&
      (needs.perf.result == 'success' || needs.perf.result == 'failure')
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      EDAMAME_POSTURE_USER: ${{ vars.EDAMAME_POSTURE_USER }}
      EDAMAME_POSTURE_DOMAIN: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
      EDAMAME_POSTURE_PIN: ${{ secrets.EDAMAME_POSTURE_PIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The org-level IP allow list blocks gh api / gh run download from
      # stock GitHub-hosted runners. Starting EDAMAME Posture in connected
      # mode lets the daemon register this runner with the hub and get
      # its egress IP whitelisted, which is the same pattern other
      # workflows in this repo use.
      - name: Setup EDAMAME Posture (whitelist runner IP)
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-perf-report
          checkout: false
          token: ${{ secrets.DEV_GITHUB_TOKEN }}
          wait_for_api: true
          wait_for_https: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all perf platform results
        uses: actions/download-artifact@v4
        with:
          pattern: perf-*
          path: perf_artifacts

      - name: Stage consolidated results
        shell: bash
        run: |
          mkdir -p results
          for d in perf_artifacts/perf-*; do
            [[ -d "$d" ]] || continue
            label=$(basename "$d" | sed 's/^perf-//')
            cp -R "$d" "results/$label"
          done
          ls -la results

      - name: Download baseline from last successful tests.yml run
        id: baseline
        shell: bash
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.DEV_GITHUB_TOKEN }}
        run: |
          mkdir -p baseline
          # Find the most recent successful tests.yml run (other than
          # this one) that explicitly uploaded a performance-baseline
          # artifact. Partial smoke-test runs only upload the
          # performance-report and are skipped here so they don't
          # overwrite a real baseline.
          echo "Looking for the most recent successful run with a performance-baseline artifact..."
          PREV_RUN=""
          RUNS=$(gh run list \
            --workflow tests.yml \
            --repo "${{ github.repository }}" \
            --branch main \
            --status success \
            --limit 30 \
            --json databaseId \
            --jq '.[].databaseId' 2>/dev/null || true)
          for rid in $RUNS; do
            if [[ "$rid" == "${{ github.run_id }}" ]]; then
              continue
            fi
            if gh api "repos/${{ github.repository }}/actions/runs/$rid/artifacts" \
                --jq '.artifacts[].name' 2>/dev/null | grep -q '^performance-baseline$'; then
              PREV_RUN="$rid"
              break
            fi
          done

          if [[ -z "$PREV_RUN" ]]; then
            echo "No previous successful run with performance-baseline found."
            echo "Gate will run in soft no-op mode."
            exit 0
          fi

          echo "Downloading performance-baseline from run $PREV_RUN..."
          gh run download "$PREV_RUN" \
            --repo "${{ github.repository }}" \
            --name performance-baseline \
            --dir baseline
          echo "baseline_run=$PREV_RUN" >> "$GITHUB_OUTPUT"

      - name: Inspect baseline
        if: always()
        shell: bash
        run: |
          if [ -d baseline/results ]; then
            echo "Baseline present (from run ${{ steps.baseline.outputs.baseline_run }}):"
            ls -la baseline/results
          else
            echo "No baseline available - gate will run in soft no-op mode."
          fi

      - name: Generate PERFORMANCE.md
        id: report
        shell: bash
        run: |
          python3 tests/perf/generate_report.py \
            --results-dir results \
            --output PERFORMANCE.md
          head -80 PERFORMANCE.md
        continue-on-error: true

      - name: Enforce performance release gate
        id: gate
        if: always()
        shell: bash
        continue-on-error: true
        env:
          # 100% absolute regression headroom is required because the perf
          # baseline and the current run land on different GitHub-hosted
          # Azure VMs with very different CPU steal: empirical
          # baseline-to-current variance on ubuntu-x64/windows-x64 across
          # consecutive same-code runs sits between +50% and +180% on
          # short-window CPU max metrics. A tighter threshold flags pure
          # runner noise as regression. A real perf regression worth
          # blocking a release is one that doubles steady-state CPU/RSS,
          # which the +100% threshold still catches.
          # check_regression.py applies per-metric and per-scenario
          # multipliers on top of this base threshold:
          #   * cpu_percent_max gets x2 (peak CPU is dominated by 1-second
          #     cross-tenant CPU steal spikes on shared Azure VMs).
          #   * the `llm` scenario gets x4 across all metrics because
          #     the local LLM model is downloaded/loaded lazily and may
          #     warm during one run but not another, producing legitimate
          #     2-3x swings in CPU/RSS independent of the code under test.
          # See tests/perf/check_regression.py METRICS / SCENARIO_MULTIPLIERS
          # for the per-knob rationale.
          REGRESSION_THRESHOLD: "1.00"
        run: |
          set +e
          python3 tests/perf/check_regression.py \
            --current results \
            --baseline baseline/results \
            --threshold "$REGRESSION_THRESHOLD" \
            | tee gate-summary.md
          rc=${PIPESTATUS[0]}
          echo "Gate exit code: $rc"
          exit "$rc"

      - name: Append report to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Performance Report";
            echo;
            if [[ -f gate-summary.md ]]; then
              cat gate-summary.md;
              echo;
            fi
            if [[ -f PERFORMANCE.md ]]; then
              cat PERFORMANCE.md;
            else
              echo "_PERFORMANCE.md was not generated (report step failed)._";
            fi
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload consolidated artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            PERFORMANCE.md
            gate-summary.md
            results/
          if-no-files-found: warn
          retention-days: 90

      - name: Stage baseline artifact for future runs
        # Only publish a new baseline when:
        # - Report and gate both succeeded (no silent regression -> baseline)
        # - This was a full default run from source (perf_full_default
        #   covers full default platform set + scenarios + duration)
        # - Partial / smoke-test runs MUST NOT overwrite a real baseline
        id: promote
        if: |
          steps.report.outcome == 'success' && steps.gate.outcome == 'success' &&
          needs.setup.outputs.perf_full_default == 'true'
        shell: bash
        run: |
          rm -rf baseline_next
          mkdir -p baseline_next
          cp -R results baseline_next/results
          cp PERFORMANCE.md baseline_next/ 2>/dev/null || true
          echo "Staged new baseline for future runs (run_id=${{ github.run_id }})"
          echo "promoted=true" >> "$GITHUB_OUTPUT"

      - name: Upload performance-baseline artifact
        if: steps.promote.outputs.promoted == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: baseline_next/
          if-no-files-found: warn
          retention-days: 365

      - name: Slack alerts
        if: steps.report.outcome == 'failure' || steps.gate.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Performance Gate for ${{ github.repository }}*:
            - Report Generation: ${{ steps.report.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Release Gate (+100% regression): ${{ steps.gate.outcome != 'failure' && '✅ Pass' || '❌ Regression' }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Fail job if report or gate failed
        if: steps.report.outcome == 'failure' || steps.gate.outcome == 'failure'
        shell: bash
        run: |
          echo "## Performance Gate Summary"
          echo "- Report Generation: ${{ steps.report.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Release Gate: ${{ steps.gate.outcome != 'failure' && '✅ Pass' || '❌ Regression' }}"
          echo ""
          echo "Forcing performance job to fail because the release gate is not satisfied."
          echo "A +100% regression on any tracked metric justifies blocking or rolling back the release."
          exit 1

  # =========================================================================
  # security-report: consolidate per-platform CVE results, enforce strict gate
  # =========================================================================
  security-report:
    name: Security report (consolidate + strict gate)
    needs: [setup, security]
    if: |
      always() && needs.setup.result == 'success' &&
      needs.setup.outputs.run_security == 'true' &&
      needs.setup.outputs.have_native == 'true' &&
      (needs.security.result == 'success' || needs.security.result == 'failure')
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all security platform results
        uses: actions/download-artifact@v4
        with:
          pattern: security-*
          path: security_artifacts

      - name: Stage consolidated results
        shell: bash
        run: |
          mkdir -p results
          for d in security_artifacts/security-*; do
            [[ -d "$d" ]] || continue
            label=$(basename "$d" | sed 's/^security-//')
            cp -R "$d" "results/$label"
          done
          ls -la results

      - name: Generate VULNDETECTION.md
        id: report
        shell: bash
        run: |
          python3 tests/security/generate_report.py \
            --results-dir results \
            --output VULNDETECTION.md
          head -80 VULNDETECTION.md
        continue-on-error: true

      - name: Enforce security release gate
        id: gate
        if: always()
        shell: bash
        continue-on-error: true
        run: |
          set +e
          python3 tests/security/check_gate.py --results-dir results | tee gate-summary.md
          rc=${PIPESTATUS[0]}
          echo "Gate exit code: $rc"
          exit "$rc"

      - name: Append report to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Vulnerability Detection Report";
            echo;
            if [[ -f gate-summary.md ]]; then
              cat gate-summary.md;
              echo;
            fi
            if [[ -f VULNDETECTION.md ]]; then
              cat VULNDETECTION.md;
            else
              echo "_VULNDETECTION.md was not generated (report step failed)._";
            fi
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload consolidated artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            VULNDETECTION.md
            gate-summary.md
            results/
          if-no-files-found: warn
          retention-days: 90

      - name: Slack alerts
        if: steps.report.outcome == 'failure' || steps.gate.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: |
            *Security Gate for ${{ github.repository }}*:
            - Report Generation: ${{ steps.report.outcome != 'failure' && '✅ Success' || '❌ Failed' }}
            - Release Gate (strict): ${{ steps.gate.outcome != 'failure' && '✅ Pass' || '❌ Regression (any CVE scenario failed on any platform)' }}
            Branch: ${{ github.ref }}
            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Fail job if report or gate failed
        if: steps.report.outcome == 'failure' || steps.gate.outcome == 'failure'
        shell: bash
        run: |
          echo "## Security Gate Summary"
          echo "- Report Generation: ${{ steps.report.outcome != 'failure' && '✅ Success' || '❌ Failed' }}"
          echo "- Release Gate (strict): ${{ steps.gate.outcome != 'failure' && '✅ Pass' || '❌ Regression (any CVE scenario failed on any platform)' }}"
          echo ""
          echo "Forcing security job to fail: at least one CVE detection"
          echo "scenario reported status=fail on at least one platform."
          echo "The gate is strict (100% success required). Probabilistic"
          echo "iForest-dependent evasion scenarios are tracked under"
          echo "edamame_core/tests/evasion/ and do not gate releases here."
          echo "Block or roll back the release."
          exit 1

# ci: retrigger after transient lanscan perf flake (2026-05-16)
